<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo Jurídico — Minutas Legales Colombia</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ─── KPI Numbers: Arial, not serif ─── */
    .mon-kpi-value { font-family: Arial, sans-serif; font-weight: 700; color: var(--blue, #1a3a5c); font-size: 1.9rem; line-height: 1; }
    .mon-kpi.kpi-accent .mon-kpi-value { color: var(--gold-dk, #a8893a); }
    .mon-kpi.kpi-pub .mon-kpi-value { color: var(--amber, #d97706); }
    .mon-kpi.kpi-warn .mon-kpi-value { color: var(--green, #16a34a); }

    /* ─── Panel Search Bars ─── */
    .panel-search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      position: relative;
    }
    .panel-search {
      flex: 1;
      padding: 9px 13px 9px 32px;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #0f1923;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .panel-search:focus {
      border-color: #2563a8;
      box-shadow: 0 0 0 3px rgba(37, 99, 168, 0.12);
    }
    .panel-search::placeholder {
      color: #a8bccf;
    }
    .panel-search-icon {
      position: absolute;
      left: 11px;
      color: #a8bccf;
      pointer-events: none;
      font-size: 14px;
    }

    /* ─── Badge: Review Manually ─── */
    .mon-badge-review {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 0.61rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fca5a5;
    }

    /* Base styles (from original monitoreo.html) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a3a5c;
      --blue-mid: #2563a8;
      --blue-dark: #0d2540;
      --blue-lt: #eaf1fb;
      --blue-xlt: #f3f7fd;
      --gold: #c9a84c;
      --gold-dk: #a8893a;
      --gold-bg: #fdf8ed;
      --white: #ffffff;
      --bg: #f0f3f8;
      --bg-card: #ffffff;
      --bdr: #dde3ec;
      --bdr-mid: #c8d3e2;
      --text: #0f1923;
      --text2: #354a61;
      --text3: #6e8499;
      --text4: #a8bccf;
      --green: #16a34a;
      --green-lt: #dcfce7;
      --green-dk: #166534;
      --amber: #d97706;
      --amber-lt: #fef3c7;
      --red: #dc2626;
      --red-lt: #fee2e2;
      --purple: #7c3aed;
      --sh-xs: 0 1px 3px rgba(15,25,35,.06),0 1px 2px rgba(15,25,35,.04);
      --sh-sm: 0 4px 12px rgba(15,25,35,.08),0 1px 4px rgba(15,25,35,.05);
      --r: 8px;
      --r-md: 10px;
      --r-lg: 14px;
      --dur: .18s;
      --ease: cubic-bezier(.4,0,.2,1);
      --font: "Inter",-apple-system,BlinkMacSystemFont,sans-serif;
      --font-d: "Cormorant Garamond",Georgia,serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    ::selection { background: #f0e0a0; color: var(--blue-dark); }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); cursor: pointer; }
  </style>
</head>
<body>
  <div id="monitoreo-content"></div>
  <script src="monitoreo.js"></script>
</body>
</html>
