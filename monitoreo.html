  if(!/^\d{23}$/.test(raw)){showToast("El radicado debe tener exactamente 23 dígitos.","error");return;}
  if(seguimientos.some(s=>s.radicado===raw)){showToast("Ya tienes ese radicado en seguimiento.","error");return;}
  const sub=getSub();
  if(sub?.plan==="basico"&&seguimientos.length>=LIM_BAS){showToast(`Plan Básico: máximo ${LIM_BAS} procesos.`,"error");return;}

  const btn=document.getElementById("btn-add"); if(btn){btn.disabled=true;btn.innerHTML=`${IC.spinner} Consultando…`;}
  const sb=document.getElementById("step-box"); if(sb)sb.classList.add("visible");

  setStep(1,"active","Buscando en Consulta Procesos…");
  setStep(2,"wait"); setStep(3,"wait");

  let resultado=null;
  try{
    resultado=await consultarRJ(raw);
    if(!resultado){setStep(1,"error","No encontrado");return;}
    setStep(1,"done","Proceso encontrado");
    setStep(2,"active","Cargando actuaciones…");
    await new Promise(r=>setTimeout(r,200)); /* pequeña pausa visual */
    setStep(2,"done",`${resultado.actuaciones.length} actuaciones cargadas`);
    setStep(3,"active","Guardando en tu cuenta…");

    const cl=getClient(),user=getUser();
    const {data,error}=await cl.from("seguimientos").insert({
      user_id:user.id, radicado:raw, alias:alias||null,
      nombre_proceso:resultado.proceso.tipoProceso||null,
      despacho:resultado.proceso.despacho||null,
      sujetos:resultado.proceso.sujetosProcesales||null,
      id_proceso:String(resultado.proceso.idProceso),
      actuaciones:resultado.actuaciones,
      ultima_actuacion:resultado.actuaciones[0]?.fechaActuacion||null,
      tiene_cambios:false, ultimo_chequeo:new Date().toISOString(),
      match_confianza:resultado.matchConfianza||"alta",
    }).select("id,radicado,alias,nombre_proceso,despacho,sujetos,id_proceso,ultima_actuacion,tiene_cambios,ultimo_chequeo,created_at,tiene_publicacion_nueva,pub_count,match_confianza").single();

    if(error)throw error;
    setStep(3,"done","¡Guardado!");
    await new Promise(r=>setTimeout(r,600));

    actsCache[data.id]=resultado.actuaciones;
    pubsCache[data.id]=[];
    seguimientos.unshift(data);
    guardarCache(seguimientos);
    document.getElementById("inp-rad").value="";
    document.getElementById("inp-alias").value="";
    document.getElementById("add-form-outer")?.remove();
    /* Mostrar tarjeta en estado skeleton mientras se buscan publicaciones procesales */
    _ppBuscando.add(data.id);
    renderKPIs(); renderNavCounts(); renderLista();
    showToast("Proceso agregado. Buscando publicaciones procesales…","ok");
    /* Consultar PP en segundo plano y actualizar registro */
    _consultarPPYActualizar(data);
  }catch(err){
    console.error(err);
    setStep(3,"error","Error al guardar");
    showToast("Error al agregar el proceso.","error");
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML=`${IC.plus} Agregar proceso`;}
    setTimeout(()=>{ const sb=document.getElementById("step-box"); if(sb)sb.classList.remove("visible"); },2000);
  }
}

/* ══ IDENTIFICACIÓN DEL JUZGADO CORRECTO ══
   La API de Consulta de Procesos por radicado puede devolver procesos de OTROS
   juzgados/ciudades que solo comparten año y consecutivo con el radicado buscado
   (ej. 2026-00719 existe tanto en un juzgado de Ibagué como en uno de Cali).
   El radicado colombiano de 23 dígitos codifica el número de juzgado en las
   posiciones 10-11, dato determinista que no depende de texto libre. Usamos ese
   número (y, en refrescos, el despacho/sujetos ya guardados) para elegir siempre
   el proceso correcto y no mezclar datos de otro juzgado. */
function _normTxt(str){
  return (str||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
}
function extraerNumeroJuzgadoDeRadicado(radicado){
  const r=(radicado||"").replace(/\D/g,"");
  if(r.length!==23) return null;
  return parseInt(r.substring(10,12),10);
}
function extraerNumeroJuzgado(texto){
  const m=(texto||"").match(/\b0*(\d+)\b/);
  return m?parseInt(m[1],10):null;
}
function encontrarMejorCoincidencia(procesos,s){
  if(!procesos?.length) return null;
  if(procesos.length===1) return procesos[0];
  if(s.id_proceso){
    const porId=procesos.find(p=>String(p.idProceso)===String(s.id_proceso));
    if(porId) return porId;
  }
  const despachoBase=_normTxt(s.despacho||""), sujetosBase=_normTxt(s.sujetos||"");
  if(!despachoBase&&!sujetosBase) return procesos[0];
  const numJuzgadoBase=extraerNumeroJuzgado(despachoBase);
  let mejorPuntaje=-Infinity, mejorProceso=procesos[0];
  for(const proc of procesos){
    let puntaje=0;
    const despachoProc=_normTxt(proc.despacho||""), sujetosProc=_normTxt(proc.sujetosProcesales||"");
    if(numJuzgadoBase!==null){
      const numJuzgadoProc=extraerNumeroJuzgado(despachoProc);
      if(numJuzgadoProc!==null) puntaje+= numJuzgadoProc===numJuzgadoBase?70:-100;
    }
    if(despachoBase&&despachoProc){
      const palabrasBase=despachoBase.split(" ").filter(w=>w.length>3);
      if(palabrasBase.length){
        const coinciden=palabrasBase.filter(w=>despachoProc.includes(w));
        puntaje+=(coinciden.length/palabrasBase.length)*20;
      }
    }
    if(sujetosBase&&sujetosProc){
      const palabrasBase=sujetosBase.split(/[\s·,.\-/]+/).filter(w=>w.length>3);
      if(palabrasBase.length){
        const coinciden=palabrasBase.filter(w=>sujetosProc.includes(w));
        puntaje+=(coinciden.length/palabrasBase.length)*30;
      }
    }
    if(puntaje>mejorPuntaje){mejorPuntaje=puntaje;mejorProceso=proc;}
  }
  return mejorProceso;
}

/* La API de la Rama Judicial no garantiza que "actuaciones[0]" sea siempre la
   más reciente (a veces llegan en orden de registro, no de fecha). Como
   "días sin actuación" y "última actuación" se calculan a partir de la
   posición [0], un orden incorrecto producía fechas incoherentes (por
   ejemplo, mostrar 0 días cuando en realidad ya habían pasado varios).
   Ordenamos siempre por fecha descendente antes de usar la más reciente. */
function ordenarActuacionesRecientePrimero(actuaciones){
  if(!Array.isArray(actuaciones)||actuaciones.length<2) return actuaciones||[];
  return [...actuaciones].sort((a,b)=>{
    const ta=a?.fechaActuacion?new Date(a.fechaActuacion).getTime():-Infinity;
    const tb=b?.fechaActuacion?new Date(b.fechaActuacion).getTime():-Infinity;
    return tb-ta;
  });
}

/* ══ CONSULTAR RJ — búsqueda por radicado. Recibe opcionalmente el despacho y los
   sujetos YA GUARDADOS en `seguimientos` (s.despacho / s.sujetos) para cuando se
   llama sobre un proceso existente sin id_proceso (ver consultarRJPorId). Con eso,
   además del número de juzgado codificado en el radicado, se usa despachoCoincide()
   para preferir, entre varios procesos candidatos con actuaciones, el que
   realmente corresponde al despacho/sujetos guardados — en vez de tomar
   ciegamente el primero con actuaciones. Devuelve matchConfianza:"alta"|"baja"
   para que el llamador pueda marcar el registro para revisión manual. ══ */
async function consultarRJ(radicado,despachoGuardado,sujetosGuardados){
  try{
    const r=await fetchRJ(`${RJ_API}/Procesos/Consulta/NumeroRadicacion?numero=${radicado}&SoloActivos=false&pagina=1`,{headers:RJ_HDR});
    if(!r.ok){showToast("Error consultando la Rama Judicial.","error");return null;}
    const d=await r.json();
    if(!d.procesos?.length){showToast("No se encontró ningún proceso con ese radicado.","error");return null;}

    /* Paso 1: identificar el proceso correcto por el número de juzgado codificado
       en el propio radicado. Aplica siempre, sin importar cuántos procesos
       devuelva la API (pueden ser de otras ciudades con el mismo año-consecutivo). */
    const numJuzgadoRad=extraerNumeroJuzgadoDeRadicado(radicado);
    let procesoCandidato=null;
    if(numJuzgadoRad!==null){
      procesoCandidato=d.procesos.find(proc=>extraerNumeroJuzgado(proc.despacho||"")===numJuzgadoRad)||null;
    }
    /* d.procesos.length===1 o coincidencia inequívoca por juzgado ⇒ alta confianza */
    let matchConfianza=(d.procesos.length===1||procesoCandidato)?"alta":null;
    if(!procesoCandidato) procesoCandidato=d.procesos[0];

    /* Paso 2: obtener actuaciones de TODOS los procesos candidatos cuando hay más
       de uno, para poder aplicar despachoCoincide() sobre los que sí tienen
       actuaciones (en vez de conformarnos con el primero que tenga). */
    let proceso=procesoCandidato, actuaciones=[];
    const rA=await fetchRJ(`${RJ_API}/Proceso/Actuaciones/${procesoCandidato.idProceso}?pagina=1`,{headers:RJ_HDR});
    const dA=rA.ok?await rA.json():{};
    actuaciones=Array.isArray(dA.actuaciones)?dA.actuaciones:Array.isArray(dA)?dA:[];

    if(d.procesos.length>1&&matchConfianza===null){
      /* Ambiguo por juzgado: recolectar todos los procesos con actuaciones y
         usar despachoCoincide() (vía encontrarMejorCoincidencia, que ya
         compara despacho/sujetos) para preferir el que corresponde al
         despacho/sujetos guardados en `seguimientos`. */
      const candidatosConActs=[];
      if(actuaciones.length) candidatosConActs.push({proc:procesoCandidato,acts:actuaciones});
      for(const proc of d.procesos){
        if(proc.idProceso===procesoCandidato.idProceso) continue;
        const rA2=await fetchRJ(`${RJ_API}/Proceso/Actuaciones/${proc.idProceso}?pagina=1`,{headers:RJ_HDR});
        const dA2=rA2.ok?await rA2.json():{};
        const acts2=Array.isArray(dA2.actuaciones)?dA2.actuaciones:Array.isArray(dA2)?dA2:[];
        if(acts2.length) candidatosConActs.push({proc,acts:acts2});
      }
      if(candidatosConActs.length===1){
        proceso=candidatosConActs[0].proc; actuaciones=candidatosConActs[0].acts;
        matchConfianza="alta";
      }else if(candidatosConActs.length>1){
        if(despachoGuardado||sujetosGuardados){
          const elegido=encontrarMejorCoincidencia(candidatosConActs.map(c=>c.proc),{despacho:despachoGuardado,sujetos:sujetosGuardados});
          const despachoElegido=_normTxt(elegido?.despacho||""),despachoBase=_normTxt(despachoGuardado||"");
          const coincideClaramente=elegido&&despachoBase&&despachoElegido&&extraerNumeroJuzgado(despachoElegido)===extraerNumeroJuzgado(despachoBase);
          if(coincideClaramente){
            const encontrado=candidatosConActs.find(c=>c.proc===elegido);
            proceso=encontrado.proc; actuaciones=encontrado.acts; matchConfianza="alta";
          }else{
            /* Ninguno coincide claramente por despacho: conservar el
               comportamiento previo (tomar el primero con actuaciones). */
            proceso=candidatosConActs[0].proc; actuaciones=candidatosConActs[0].acts; matchConfianza="baja";
          }
        }else{
          proceso=candidatosConActs[0].proc; actuaciones=candidatosConActs[0].acts; matchConfianza="baja";
        }
      }else{
        matchConfianza="baja";
      }
    }else if(!actuaciones.length){
      /* Un solo candidato claro pero sin actuaciones propias: se toman prestadas
         de otro proceso SOLO como referencia, sin cambiar el despacho elegido. */
      for(const proc of d.procesos){
        if(proc.idProceso===procesoCandidato.idProceso) continue;
        const rA2=await fetchRJ(`${RJ_API}/Proceso/Actuaciones/${proc.idProceso}?pagina=1`,{headers:RJ_HDR});
        const dA2=rA2.ok?await rA2.json():{};
        const acts2=Array.isArray(dA2.actuaciones)?dA2.actuaciones:Array.isArray(dA2)?dA2:[];
        if(acts2.length){actuaciones=acts2;break;}
      }
    }
    if(!matchConfianza) matchConfianza="alta";

    await _completarTipoProceso(proceso);
    return {proceso,actuaciones:ordenarActuacionesRecientePrimero(actuaciones),matchConfianza};
  }catch(err){console.error(err);showToast("No se pudo conectar con la Rama Judicial.","error");return null;}
}

/* El endpoint de búsqueda por radicado (Procesos/Consulta/NumeroRadicacion) NO
   trae el tipo/clase de proceso (ej. "Ejecutivo con Título Hipotecario") —
   ese dato solo viene en Proceso/Detalle/{idProceso}. Sin esta llamada,
   "Tipo de proceso" siempre queda vacío ("—") al agregar un proceso nuevo.
   Muta el objeto `proceso` en sitio agregándole `tipoProceso` con el nombre
   de clase más específico disponible (claseProceso > tipoProceso genérico). */
async function _completarTipoProceso(proceso){
  if(!proceso?.idProceso) return;
  try{
    const r=await fetchRJ(`${RJ_API}/Proceso/Detalle/${proceso.idProceso}`,{headers:RJ_HDR});
    if(!r.ok) return;
    const d=await r.json();
    proceso.tipoProceso=d?.claseProceso||d?.tipoProceso||null;
  }catch(_){}
}

/* ══ CONSULTAR RJ POR ID — usado al refrescar un proceso ya guardado.
   Coteja despacho + sujetos + número de juzgado (guardados y codificados en el
   radicado) para no traer nunca datos de un proceso homónimo en otro juzgado
   o ciudad, aunque comparta año y consecutivo con el radicado en seguimiento. ══ */
async function consultarRJPorId(s){
  if(!s.id_proceso) return consultarRJ(s.radicado,s.despacho,s.sujetos);
  try{
    const r=await fetchRJ(`${RJ_API}/Procesos/Consulta/NumeroRadicacion?numero=${s.radicado}&SoloActivos=false&pagina=1`,{headers:RJ_HDR});
    if(!r.ok){showToast("Error consultando la Rama Judicial.","error");return null;}
    const d=await r.json();

    let proceso=null, matchConfianza="alta";
    if(d.procesos?.length){
      const numJuzgadoRad=extraerNumeroJuzgadoDeRadicado(s.radicado);

      /* Intento 1: coincidencia por id_proceso guardado, verificando que el
         número de juzgado no entre en conflicto claro con el del radicado. */
      const porId=d.procesos.find(p=>String(p.idProceso)===String(s.id_proceso));
      if(porId){
        const numJuzgadoEncontrado=extraerNumeroJuzgado(porId.despacho||"");
        const hayConflictoClaro=numJuzgadoRad!==null&&numJuzgadoEncontrado!==null&&numJuzgadoEncontrado!==numJuzgadoRad;
        if(!hayConflictoClaro) proceso=porId;
      }
      /* Intento 2: por número de juzgado codificado en el radicado (más confiable) */
      if(!proceso&&numJuzgadoRad!==null){
        proceso=d.procesos.find(p=>extraerNumeroJuzgado(p.despacho||"")===numJuzgadoRad)||null;
      }
      /* Intento 3: cotejo por despacho + sujetos guardados (heurística de texto,
         no una coincidencia exacta) — si hace falta llegar hasta aquí y además
         hay más de un proceso candidato, la confianza es baja. */
      if(!proceso){
        proceso=encontrarMejorCoincidencia(d.procesos,s);
        if(d.procesos.length>1) matchConfianza="baja";
      }
    }
    if(!proceso){showToast("No se encontró el proceso en la Rama Judicial.","error");return null;}

    const idProcesoReal=String(proceso.idProceso);
    const rAct=await fetchRJ(`${RJ_API}/Proceso/Actuaciones/${idProcesoReal}?pagina=1`,{headers:RJ_HDR});
    const dAct=rAct.ok?await rAct.json():{};
    const actuaciones=Array.isArray(dAct.actuaciones)?dAct.actuaciones:Array.isArray(dAct)?dAct:[];
    await _completarTipoProceso(proceso);
    return {proceso,actuaciones:ordenarActuacionesRecientePrimero(actuaciones),idProcesoReal,matchConfianza};
  }catch(err){console.error(err);showToast("No se pudo conectar con la Rama Judicial.","error");return null;}
}

/* ══ CONSULTAR PP ══ */
async function consultarPP(s){
  let pubs=[], error=null;

  /* 1. API RJ — siempre disponible (CORS abierto)
        Fetches múltiples páginas para capturar publicaciones recientes.
        La API devuelve resultados en orden variable; combinamos todas las páginas. */
  if(s.id_proceso){
    try{
      let allRaw=[], paginaRJ=1, totalPags=1;
      do{
        const r=await fetchRJ(`${RJ_API}/Proceso/Publicaciones/${s.id_proceso}?pagina=${paginaRJ}`,{headers:RJ_HDR});
        if(!r.ok) break;
        let d; try{d=await r.json();}catch{d=null;}
        const raw=Array.isArray(d?.publicaciones)?d.publicaciones:Array.isArray(d)?d:[];
        if(!raw.length) break;
        /* Deduplicar por uuid/fileEntryId/título antes de concatenar */
        for(const item of raw){
          const key=item.uuid||item.fileEntryId||item.title||JSON.stringify(item);
          if(!allRaw.some(x=>(x.uuid&&x.uuid===item.uuid)||(x.fileEntryId&&x.fileEntryId===item.fileEntryId)||(x.title&&x.title===item.title)))
            allRaw.push(item);
        }
        if(paginaRJ===1){
          totalPags=d?.totalPaginas||d?.paginas||1;
          if(totalPags<2&&d?.totalRegistros>raw.length) totalPags=2;
        }
        paginaRJ++;
      }while(paginaRJ<=Math.min(totalPags,5));
      /* Esta fuente se consulta directamente por id_proceso (no por texto/año-secuencia),
         así que la Rama Judicial ya garantiza que las publicaciones pertenecen a ESTE
         proceso exacto. NO se filtra por nombre de despacho aquí: los despachos pueden
         tener variantes de nombre entre el proceso y la publicación (ej. "JUZGADO 002
         CIVIL DEL CIRCUITO DE MEDELLÍN" vs "JUZGADO SEGUNDO CIVIL DEL CIRCUITO DE
         ORALIDAD" — mismo juzgado, otra forma de nombrarlo) que hacían que el filtro de
         ciudad rechazara publicaciones legítimas. El filtro de coincidencia solo aplica
         a la fuente 2 (portal PP), que sí busca por texto/radicado parcial y puede traer
         resultados de otros procesos. */
      pubs=allRaw.map(p=>({...p,pdfUrl:_pdfDePublicacion(p)}));
    }catch(e){error=e?.message||null;}
  }

  /* 2. Proxy backend (opcional) — búsqueda por múltiples formatos en portal PP */
  if(PP_API_URL){
    try{
      const params=new URLSearchParams({radicado:s.radicado||"",idProceso:s.id_proceso||""});
      const ppAnonKey=(()=>{try{return typeof SUPABASE_ANON_KEY!=="undefined"?SUPABASE_ANON_KEY:"";}catch{return "";}})();
      const r=await fetch(`${PP_API_URL}?${params}`,{headers:ppAnonKey?{"apikey":ppAnonKey,"Authorization":`Bearer ${ppAnonKey}`}:{}});
      if(r.ok){
        const d=await r.json();
        const proxyPubs=Array.isArray(d.publicaciones)?d.publicaciones:[];
        for(const p of proxyPubs){
          /* ── Filtro de coincidencia: evitar falsos positivos de otros procesos ──
             El portal PP devuelve publicaciones que comparten año-secuencia pero
             pueden ser de juzgados completamente distintos.
             Verificamos que el despacho de la publicación coincida con el del proceso,
             y también que el radicado de la publicación no corresponda a otro proceso. */
          if(!_pubCoincideConProceso(p, s)) continue;
          if(!pubs.some(x=>x.title&&x.title===p.title))
            pubs.push({...p,pdfUrl:_pdfDePublicacion(p)});
        }
      }
    }catch(_){}
  }

  /* 3. Sin proxy configurado: el portal PP no tiene CORS, no se puede buscar desde el navegador.
        Configura PP_PROXY_URL con la URL COMPLETA al endpoint pp-buscar de tu Supabase.
        Ejemplo: const PP_PROXY_URL = "https://TU_PROYECTO.supabase.co/functions/v1/pp-buscar"; */
  if(!pubs.length&&!PP_API_URL){
    console.info("[PP] Para buscar publicaciones procesales configura PP_PROXY_URL. Ejemplo:\n  const PP_PROXY_URL = 'https://TU_PROYECTO.supabase.co/functions/v1/pp-buscar';");
  }

  return{pubs,error};
}

/* ══ CONSULTAR PP Y ACTUALIZAR — llamado después de agregar proceso ══ */
async function _consultarPPYActualizar(s){
  if(!s?.id||!s?.id_proceso){ console.warn("[PP] _consultarPPYActualizar: registro incompleto",s); return; }
  try{
    let{pubs}=await consultarPP(s);
    /* Justo al agregar un proceso, la primera búsqueda a veces no encuentra
       nada aunque sí existan publicaciones (indexación del portal/la API con
       algo de retraso) — el usuario reportó que basta con esperar un poco y
       darle "Actualizar" a mano para que aparezcan. Un reintento tras una
       breve pausa reproduce ese mismo comportamiento automáticamente. */
    if(!pubs.length){
      await new Promise(r=>setTimeout(r,3000));
      ({pubs}=await consultarPP(s));
    }
    if(!pubs.length){
      /* Sin publicaciones: quitar skeleton y mostrar tarjeta real */
      _ppBuscando.delete(s.id);
      renderLista();
      return;
    }
    pubsCache[s.id]=pubs;
    const cl=getClient(); if(!cl){ _ppBuscando.delete(s.id); renderLista(); return; }
    await cl.from("seguimientos").update({
      publicaciones_procesales:pubs,
      pub_count:pubs.length,
      tiene_publicacion_nueva:pubs.length>0,
    }).eq("id",s.id);
    const idx=seguimientos.findIndex(x=>x.id===s.id);
    if(idx!==-1) Object.assign(seguimientos[idx],{pub_count:pubs.length,tiene_publicacion_nueva:pubs.length>0});
    guardarCache(seguimientos);
    /* Quitar skeleton y re-renderizar con datos reales */
    _ppBuscando.delete(s.id);
    renderKPIs(); renderNavCounts(); renderLista();
    showToast(`${pubs.length} publicación${pubs.length!==1?"es":""} procesal${pubs.length!==1?"es":""} encontrada${pubs.length!==1?"s":""}. ✓`,"ok");
  }catch(e){
    /* En caso de error, quitar skeleton igual para no bloquear la UI */
    _ppBuscando.delete(s.id);
    renderLista();
    console.warn("[PP] Error consultando publicaciones al agregar:",e);
  }
}

/* ══ ACTUALIZAR UNO ══ */
async function actualizarUno(s,manual=false){
  const btnR=document.getElementById(`btn-ref-${s.id}`);
  const orig=btnR?.innerHTML;
  if(btnR){btnR.disabled=true;btnR.innerHTML=`${IC.spinner} Actualizando…`;}
  let ppError=null;
  try{
    let prevActs=actsCache[s.id];
    if(!prevActs){const{data}=await getClient().from("seguimientos").select("actuaciones").eq("id",s.id).single();prevActs=ordenarActuacionesRecientePrimero(data?.actuaciones||[]);actsCache[s.id]=prevActs;}
    const res=await consultarRJPorId(s);
    if(!res)return{ok:false,error:"Sin respuesta"};
    const{proceso,actuaciones,idProcesoReal,matchConfianza}=res;
    /* Si el id_proceso guardado ya no coincidía con el juzgado del radicado,
       consultarRJPorId devuelve el idProceso correcto: lo persistimos y lo
       usamos de inmediato para buscar publicaciones procesales, para no
       consultar por error el id de otro juzgado/ciudad. */
    const idProcesoCambio=idProcesoReal&&String(idProcesoReal)!==String(s.id_proceso||"");
    const sParaPP=idProcesoCambio?{...s,id_proceso:idProcesoReal}:s;
    const cambio=actuaciones[0]?.fechaActuacion!==prevActs[0]?.fechaActuacion;
    const actsBase=actuaciones.length?actuaciones:prevActs;
    const acts=actsBase.map((a,i)=>({...a,esNueva:i===0&&cambio&&actuaciones.length>0}));
    const ahora=new Date().toISOString();
    const{pubs,error:errPP}=await consultarPP(sParaPP); ppError=errPP;
    let prevPubs=pubsCache[s.id];
    if(!prevPubs){const{data:dp}=await getClient().from("seguimientos").select("publicaciones_procesales").eq("id",s.id).single();prevPubs=Array.isArray(dp?.publicaciones_procesales)?dp.publicaciones_procesales:[];pubsCache[s.id]=prevPubs;}
    const pubNueva=pubs.length>(prevPubs?.length||0);
    const ultimaPub=pubs[0]?.fecha||pubs[0]?.fechaRadicado||null;
    /* Si la búsqueda PP no devolvió resultados, conservar los datos anteriores */
    const pubsToStore=pubs.length>0?pubs:prevPubs;
    const pubCountToStore=pubsToStore.length;
    const upd={despacho:proceso.despacho||s.despacho,sujetos:proceso.sujetosProcesales||s.sujetos,nombre_proceso:proceso.tipoProceso||s.nombre_proceso,id_proceso:idProcesoReal||s.id_proceso,actuaciones:actuaciones.length?acts:prevActs,ultima_actuacion:actuaciones[0]?.fechaActuacion||(prevActs[0]?.fechaActuacion||null),tiene_cambios:cambio,ultimo_chequeo:ahora,publicaciones_procesales:pubsToStore,pub_count:pubCountToStore,tiene_publicacion_nueva:pubNueva||(s.tiene_publicacion_nueva&&!pubNueva?s.tiene_publicacion_nueva:pubNueva),...(matchConfianza?{match_confianza:matchConfianza}:{})};
    /* ultima_publicacion omitida — columna no existe en el schema actual */
    const{error:updErr}=await getClient().from("seguimientos").update(upd).eq("id",s.id);
    if(updErr){
      console.error("[actualizarUno] Error guardando en BD:",updErr.message);
      if(manual)showToast("Error al guardar en la base de datos.","error");
      return{ok:false,error:updErr.message};
    }
    actsCache[s.id]=acts; pubsCache[s.id]=pubsToStore;
    /* Guardar nombre de última actuación en caché liviana */
    if(acts[0]?.actuacion){_actNames[s.id]=acts[0].actuacion;_saveActNames();}
    const idx=seguimientos.findIndex(x=>x.id===s.id);
    if(idx!==-1)Object.assign(seguimientos[idx],{despacho:proceso.despacho||s.despacho,sujetos:proceso.sujetosProcesales||s.sujetos,nombre_proceso:proceso.tipoProceso||s.nombre_proceso,id_proceso:idProcesoReal||s.id_proceso,ultima_actuacion:actuaciones[0]?.fechaActuacion||null,tiene_cambios:cambio,ultimo_chequeo:ahora,pub_count:pubCountToStore,tiene_publicacion_nueva:pubNueva,...(matchConfianza?{match_confianza:matchConfianza}:{})});
    guardarCache(seguimientos);
    renderKPIs(); renderNavCounts(); renderLista();
    if(manual){
      await guardarLog({ts:ahora,total:1,fallos:errPP?1:0,error:errPP?`PP: ${errPP}`:null});
      const msgs=[];
      if(cambio)msgs.push(`Nueva actuación`);
      if(pubNueva)msgs.push("Nueva publicación PP");
      if(errPP)msgs.push(`Error PP: ${errPP}`);
      if(!msgs.length)msgs.push("Sin cambios.");
      showToast(msgs.join(" · "),errPP?"error":(cambio||pubNueva)?"ok":"");
    } else { if(cambio)showToast(`Nuevo movimiento: ${s.alias||s.radicado.slice(-6)}`,"ok"); else if(pubNueva)showToast(`Nueva pub PP: ${s.alias||s.radicado.slice(-6)}`,"ok"); }
    return{ok:true,ppError};
  }catch(err){console.error(err);if(manual)showToast("Error al actualizar.","error");return{ok:false,error:err?.message||"Error"};}
  finally{if(btnR){btnR.disabled=false;btnR.innerHTML=orig||`${IC.refresh} Actualizar`;}}
}

/* ══ ACTUALIZAR TODOS — con barra de progreso ══ */
async function actualizarTodos(manual=false){
  if(!seguimientos.length){if(manual)showToast("No tienes procesos en seguimiento.","");return;}
  const btn=document.getElementById("btn-refresh-all");
  const bar=document.getElementById("refresh-bar");
  const fill=document.getElementById("rbar-fill");
  const label=document.getElementById("rbar-label");
  const pct=document.getElementById("rbar-pct");

  if(btn){btn.disabled=true;btn.classList.add("updating");btn.innerHTML=`${IC.spinner} Actualizando…`;}
  if(bar)bar.style.display="block";

  const lista=[...seguimientos];
  const total=lista.length;
  let done=0,rjErr=0,ppErr=0,lastRj=null,lastPp=null;

  const updateBar=()=>{
    const p=Math.round((done/total)*100);
    if(fill)fill.style.width=p+"%";
    if(label)label.textContent=`Verificando proceso ${done} de ${total}…`;
    if(pct)pct.textContent=p+"%";
  };
  updateBar();

  for(let i=0;i<lista.length;i+=3){
    const batch=lista.slice(i,i+3);
    batch.forEach(s=>{
      const card=document.getElementById(`moncard-${s.id}`);
      if(card)card.classList.add("pcard-updating");
    });
    const res=await Promise.allSettled(batch.map(s=>actualizarUno(s,false)));
    batch.forEach((s,j)=>{
      const v=res[j].status==="fulfilled"?res[j].value:{ok:false,error:res[j].reason?.message};
      if(!v?.ok){rjErr++;if(v?.error)lastRj=v.error;}
      if(v?.ppError){ppErr++;lastPp=v.ppError;}
      const card=document.getElementById(`moncard-${s.id}`);
      if(card)card.classList.remove("pcard-updating");
      done++;
      updateBar();
    });
  }

  const errTotal=rjErr+ppErr;
  const ahora=new Date().toISOString();
  let errMsg=null;
  if(rjErr>0&&ppErr>0)errMsg=`RJ: ${rjErr} error(es). PP: ${ppErr} error(es).`;
  else if(rjErr>0)errMsg=`Consulta RJ: ${lastRj}`;
  else if(ppErr>0)errMsg=`PP: ${lastPp}`;
  await guardarLog({ts:ahora,total:lista.length,fallos:errTotal,error:errMsg});

  if(fill)fill.style.width="100%";
  if(label)label.textContent=errTotal>0?`${errTotal} error(es) detectados`:`✓ ${total} proceso(s) verificados correctamente`;
  if(pct)pct.textContent="100%";
  setTimeout(()=>{ if(bar)bar.style.display="none"; },2200);

  if(btn){btn.disabled=false;btn.classList.remove("updating");btn.innerHTML=`${IC.refresh} Actualizar todos`;}
  if(manual)showToast(errTotal>0?`${errTotal} consulta(s) con error. Ver Notificaciones.`:`${total} proceso(s) actualizados.`,errTotal>0?"error":"ok");
}

/* ── Diálogo de confirmación personalizado ── */
function confirmarAccion(titulo, mensaje, labelConfirm, onConfirm){
  document.getElementById("cfdg-root")?.remove();
  const ov=document.createElement("div");
  ov.id="cfdg-root"; ov.className="cfdg-overlay";
  const trashSvg=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
  ov.innerHTML=`<div class="cfdg-box">
    <div class="cfdg-icon"><div class="cfdg-icon-inner">${trashSvg}</div></div>
    <div class="cfdg-body">
      <div class="cfdg-title">${escHtml(titulo)}</div>
      <p class="cfdg-msg">${escHtml(mensaje)}</p>
    </div>
    <div class="cfdg-actions">
      <button class="cfdg-cancel" id="cfdg-cancel">Cancelar</button>
      <button class="cfdg-confirm" id="cfdg-confirm">${escHtml(labelConfirm||"Confirmar")}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click",e=>{ if(e.target===ov) ov.remove(); });
  document.getElementById("cfdg-cancel")?.addEventListener("click",()=>ov.remove());
  document.getElementById("cfdg-confirm")?.addEventListener("click",()=>{ ov.remove(); onConfirm(); });
}

async function eliminar(id){
  confirmarAccion(
    "Eliminar proceso",
    "¿Seguro que deseas eliminar este proceso del monitoreo? Esta acción no se puede deshacer.",
    "Eliminar",
    async function(){
      const s=seguimientos.find(x=>x.id===id);
      const cl=getClient(),user=getUser();
      /* Borrar primero los datos relacionados en otras secciones (Copiloto IA, etc.)
         que se guardan aparte por radicado, para no dejar registros huérfanos
         cuando se elimina el proceso. */
      if(s?.radicado&&user?.id){
        try{ await cl.from("copiloto_consejos").delete().eq("user_id",user.id).eq("radicado",s.radicado); }
        catch(err){ console.error("[eliminar] No se pudieron borrar los consejos del Copiloto IA:",err); }
      }
      const{error}=await cl.from("seguimientos").delete().eq("id",id);
      if(error){showToast("Error al eliminar.","error");return;}
      seguimientos=seguimientos.filter(x=>x.id!==id);
      delete actsCache[id];delete pubsCache[id];delete actsPag[id];delete pubsPag[id];
      delete _actNames[id]; _saveActNames();
      _ppBuscando.delete(id);
      _aiOpen.delete(id); _saveAiOpen();
      document.getElementById("mon-acts-modal")?.remove();
      guardarCache(seguimientos);
      renderKPIs(); renderNavCounts();
      /* Actualizar la vista activa correctamente sin importar cuál filtro esté visible */
      if(filtro==="__copilot__") abrirCopilotView();
      else if(filtro==="__dashboard__") abrirDashboard();
      else if(filtro==="__minutas__") abrirMinutasView(null);
      else renderLista();
      showToast("Proceso eliminado.","");
    }
  );
}

/* ══ POLLING ══ */
function iniciarPolling(){
  if(pollingT)clearInterval(pollingT);
  if(refreshT)clearInterval(refreshT);
  pollingT=setInterval(()=>{ if(getUser()&&seguimientos.length) actualizarTodos(false); },POLL_MS);
  refreshT=setInterval(async()=>{ if(getUser()&&activo){ await cargarTodos(true); await cargarLogs(); if(filtro==="notif_consulta")renderLogs(); } },REFRESH_MS);
  document.addEventListener("visibilitychange",async()=>{ if(!document.hidden&&getUser()&&activo){ await cargarTodos(true); if(filtro==="notif_consulta"){await cargarLogs();renderLogs();} } });
}

/* ══ LOGS ══ */
async function cargarLogs(){
  const user=getUser(); if(!user)return;
  try{
    const{data,error}=await getClient().from("consulta_logs").select("id,ts,total,fallos,error_msg").eq("user_id",user.id).order("ts",{ascending:false}).limit(200);
    if(!error)logs=(data||[]).map(r=>({id:r.id,ts:r.ts,total:r.total,fallos:r.fallos,error:r.error_msg}));
  }catch{}
}
async function guardarLog(entry){
  const user=getUser(); if(!user)return;
  const local={id:null,ts:entry.ts,total:entry.total,fallos:entry.fallos,error:entry.error||null};
  logs.unshift(local); if(logs.length>200)logs=logs.slice(0,200);
  /* Incrementar badge de errores no leídos */
  if((entry.fallos>0||entry.error)&&filtro!=="notif_consulta") _setNotif(_notifUnleidos+1);
  if(filtro==="notif_consulta")renderLogs();
  try{
    const{data,error}=await getClient().from("consulta_logs").insert({user_id:user.id,ts:entry.ts,total:entry.total,fallos:entry.fallos,error_msg:entry.error||null}).select("id,ts,total,fallos,error_msg").single();
    if(!error&&data){local.id=data.id;local.ts=data.ts;}
  }catch{}
}

function renderLogs(){
  actualizarBreadcrumb("notif_consulta");
  const listEl=document.getElementById("mon-list"),pagEl=document.getElementById("mon-pag"); if(!listEl)return;
  if(!logs.length){listEl.innerHTML=`<div class="empty">${IC.alert}<h3>Sin notificaciones</h3><p>El historial se genera cada vez que se verifica un proceso.</p></div>`;if(pagEl)pagEl.innerHTML="";return;}
  const totPags=Math.max(1,Math.ceil(logs.length/LOGS_PER));
  if(logsPag>totPags)logsPag=totPags;
  const desde=(logsPag-1)*LOGS_PER,pag=logs.slice(desde,desde+LOGS_PER);
  listEl.innerHTML=`<div class="logs-wrap">
    <div class="logs-hdr">${IC.alert} Historial de verificaciones — ${logs.length} registros <button class="logs-clr" id="logs-clr">Limpiar</button></div>
    <div>${pag.map(log=>{
      const fecha=new Date(log.ts).toLocaleString("es-CO",{dateStyle:"medium",timeStyle:"short"});
      const err=log.fallos>0||log.error;
      const tit=err?`${log.fallos} de ${log.total} proceso(s) no verificados`:`${log.total} proceso(s) verificados`;
      const det=log.error||(err?"No se pudieron verificar.":"");
      return `<div class="log-row"><div class="log-dot ${err?"log-dot-err":"log-dot-ok"}"></div><div class="log-body"><div class="log-fecha">${fecha}</div><div class="log-tit">${escHtml(tit)}</div>${det?`<div class="log-det">${escHtml(det)}</div>`:""}</div><div class="log-badge ${err?"log-badge-err":"log-badge-ok"}">${err?"Error":"OK"}</div></div>`;
    }).join("")}</div>
  </div>`;
  document.getElementById("logs-clr")?.addEventListener("click",()=>{
    confirmarAccion(
      "Limpiar historial",
      "Se eliminarán todos los registros de verificación. Esta acción no se puede deshacer.",
      "Limpiar todo",
      async function(){
        const user=getUser();
        if(user){try{await getClient().from("consulta_logs").delete().eq("user_id",user.id);}catch{}}
        logs=[]; logsPag=1; renderLogs();
      }
    );
  });
  if(!pagEl)return;
  if(totPags<=1){pagEl.innerHTML="";return;}
  const d2=desde+1,h=Math.min(logsPag*LOGS_PER,logs.length);
  let btns="";
  paginasVis(logsPag,totPags).forEach(p=>{ if(p==="…")btns+=`<span class="pag-ell">…</span>`; else btns+=`<button class="pag-btn ${p===logsPag?"act":""}" data-lp="${p}">${p}</button>`; });
  pagEl.innerHTML=`<div class="pag-info">${d2}–${h} de ${logs.length}</div><div class="pag-ctrl"><button class="pag-btn" id="lp-prev" ${logsPag===1?"disabled":""}>${IC.chevLeft}</button>${btns}<button class="pag-btn" id="lp-next" ${logsPag===totPags?"disabled":""}>${IC.chevRight}</button></div>`;
  pagEl.querySelectorAll(".pag-btn[data-lp]").forEach(b=>b.addEventListener("click",()=>{logsPag=+b.dataset.lp;renderLogs();scrollTop();}));
  pagEl.querySelector("#lp-prev")?.addEventListener("click",()=>{logsPag--;renderLogs();scrollTop();});
  pagEl.querySelector("#lp-next")?.addEventListener("click",()=>{logsPag++;renderLogs();scrollTop();});
}

/* ══ EXCEL EXPORT ══ */
async function exportarExcel(){
  if(!seguimientos.length){showToast("No hay procesos para exportar.","error");return;}
  const btn=document.getElementById("sb-excel");
  if(btn){btn.disabled=true;btn.innerHTML=`${IC.spinner} Preparando…`;}
  try{
    if(!window.ExcelJS){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";
        s.onload=()=>window.ExcelJS?res():rej(new Error("ExcelJS no disponible"));
        s.onerror=()=>rej(new Error("No se pudo cargar ExcelJS"));
        document.head.appendChild(s);
      });
    }
    const wb=new window.ExcelJS.Workbook();
    wb.creator="Minutas Legales Colombia";
    wb.created=new Date();
    const ws=wb.addWorksheet("Procesos",{views:[{state:"frozen",xSplit:0,ySplit:3}]});

    /* ── Colores corporativos ── */
    const C_BRAND="FF1E3A5F";   /* azul oscuro */
    const C_HDR  ="FF2563A8";   /* azul medio */
    const C_ALT  ="FFEFF6FF";   /* azul muy claro */
    const C_WHITE="FFFFFFFF";
    const C_ALERT={Alta:"FFFCA5A5",Media:"FFFDE68A",Baja:"FFD1FAE5",Normal:C_WHITE};
    const C_ALERT_TXT={Alta:"FF991B1B",Media:"FF92400E",Baja:"FF14532D",Normal:"FF374151"};

    /* ── Fila 1: cabecera marca ── */
    ws.mergeCells("A1:J1");
    const f1=ws.getCell("A1");
    f1.value="📋 MONITOREO JURÍDICO — Minutas Legales Colombia";
    f1.font={bold:true,size:13,color:{argb:C_WHITE}};
    f1.fill={type:"pattern",pattern:"solid",fgColor:{argb:C_BRAND}};
    f1.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(1).height=26;

    /* ── Fila 2: fecha ── */
    ws.mergeCells("A2:J2");
    const f2=ws.getCell("A2");
    f2.value=`Exportado el ${new Date().toLocaleString("es-CO",{dateStyle:"full",timeStyle:"short"})}  ·  ${seguimientos.length} proceso(s)`;
    f2.font={italic:true,size:9,color:{argb:"FF6B7280"}};
    f2.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF9FAFB"}};
    f2.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(2).height=16;

    /* ── Fila 3: encabezados de columna ── */
    const cols=["Radicado","Alias","Tipo de proceso","Despacho","Demandante","Demandado","Estado","Días sin actuación","Última actuación","Última consulta"];
    const widths=[28,20,28,36,30,30,14,14,16,18];
    ws.addRow(cols);
    const hdrRow=ws.getRow(3);
    hdrRow.height=20;
    hdrRow.eachCell(cell=>{
      cell.font={bold:true,size:9,color:{argb:C_WHITE}};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:C_HDR}};
      cell.alignment={horizontal:"center",vertical:"middle",wrapText:false};
      cell.border={bottom:{style:"medium",color:{argb:"FF1D4ED8"}}};
    });
    cols.forEach((_,i)=>{ ws.getColumn(i+1).width=widths[i]; });

    /* ── Filas de datos ── */
    seguimientos.forEach((s,idx)=>{
      let dem="",dem2="";
      if(s.sujetos){const l=s.sujetos.split(/\r?\n/);dem=(l[0]||"").trim();dem2=l.slice(1).join(" ").replace(/^\t+/,"").trim();}
      const clase=clasificar(s);
      const dias=s.ultima_actuacion?Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000):"";
      const uAct=s.ultima_actuacion?new Date(s.ultima_actuacion).toLocaleDateString("es-CO"):"";
      const uCon=s.ultimo_chequeo?new Date(s.ultimo_chequeo).toLocaleString("es-CO"):"";

      const row=ws.addRow([s.radicado||"",s.alias||"",s.nombre_proceso||"",s.despacho||"",dem,dem2,clase,dias,uAct,uCon]);
      row.height=16;
      const alt=idx%2===0;
      const bgArgb=alt?C_ALT:C_WHITE;

      /* Estado col (G=7): color según urgencia */
      const urgencia=typeof dias==="number"&&dias>45?"Alta":typeof dias==="number"&&dias>20?"Media":typeof dias==="number"?"Baja":"Normal";
      const urgFg=C_ALERT[urgencia]||C_WHITE;
      const urgTxt=C_ALERT_TXT[urgencia]||"FF374151";

      row.eachCell((cell,col)=>{
        cell.font={size:8,color:{argb:col===7?urgTxt:"FF374151"}};
        cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:col===7?urgFg:bgArgb}};
        cell.alignment={vertical:"middle",wrapText:false};
        if(col===1)cell.font={...cell.font,bold:true,color:{argb:"FF1E3A5F"}};
        if(col===8){cell.alignment={...cell.alignment,horizontal:"center"};if(typeof dias==="number"&&dias>45)cell.font={...cell.font,bold:true};}
      });
    });

    /* ── Auto-filter en cabecera ── */
    ws.autoFilter={from:{row:3,column:1},to:{row:3,column:cols.length}};

    /* ── Hoja de resumen KPI ── */
    const ws2=wb.addWorksheet("Resumen");
    ws2.getColumn(1).width=30; ws2.getColumn(2).width=18;
    const addKpi=(label,val)=>{
      const r=ws2.addRow([label,val]);
      r.getCell(1).font={size:9,color:{argb:"FF374151"}};
      r.getCell(2).font={bold:true,size:9,color:{argb:C_BRAND}};
      r.getCell(2).alignment={horizontal:"right"};
    };
    ws2.addRow(["📊 RESUMEN ESTADÍSTICO"]);
    ws2.getRow(ws2.rowCount).getCell(1).font={bold:true,size:11,color:{argb:C_BRAND}};
    ws2.addRow([]);
    const urgentes=seguimientos.filter(s=>s.ultima_actuacion&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)>45).length;
    const atencion=seguimientos.filter(s=>s.ultima_actuacion&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)>20&&Math.floor((Date.now()-new Date(s.ultima_actuacion))/86400000)<=45).length;
    addKpi("Total de procesos en monitoreo",seguimientos.length);
    addKpi("Procesos urgentes (>45 días sin actuación)",urgentes);
    addKpi("Procesos con atención pronta (20-45 días)",atencion);
    addKpi("Procesos activos al día",seguimientos.length-urgentes-atencion);
    addKpi("Fecha de exportación",new Date().toLocaleDateString("es-CO",{dateStyle:"long"}));

    /* ── Descargar ── */
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url;
    a.download=`MonitoreoJuridico_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast(`${seguimientos.length} proceso(s) exportados a Excel.`,"ok");
  }catch(err){
    showToast("Error al exportar: "+err.message,"error");
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML=`${IC.save} Exportar Excel`;}
  }
}

/* ══ UTILS ══ */
function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ══ MOBILE NAV — funciones llamadas por onclick en HTML ══ */
window._mobToggleSidebar=function(){
  const sb=document.getElementById("sidebar");
  const ov=document.getElementById("mob-overlay");
  const isOpen=sb?.classList.contains("mob-open");
  sb?.classList.toggle("mob-open",!isOpen);
  ov?.classList.toggle("open",!isOpen);
};
window._mobCloseSidebar=function(){
  document.getElementById("sidebar")?.classList.remove("mob-open");
  document.getElementById("mob-overlay")?.classList.remove("open");
};
window._mobNav=function(filter){
  /* Actualizar estado visual de botones del nav inferior */
  document.querySelectorAll(".mob-nav-btn").forEach(b=>b.classList.remove("active"));
  const map={todos:"mob-btn-todos",novedad:"mob-btn-novedad",novedad_pp:"mob-btn-todos"};
  document.getElementById(map[filter]||"mob-btn-todos")?.classList.add("active");
  /* Sincronizar con sidebar */
  document.querySelectorAll(".sb-item").forEach(el=>
    el.classList.toggle("active",el.dataset.filter===filter));
  filtro=filter; pagina=1; renderLista();
  window._mobCloseSidebar();
};
window._mobNavTool=function(tool){
  /* Limpiar todos los estados activos (active, ai-active, min-active) */
  document.querySelectorAll(".mob-nav-btn").forEach(b=>{
    b.classList.remove("active","ai-active","min-active","add-active");
  });
  if(tool==="copilot"){
    document.getElementById("mob-btn-ai")?.classList.add("ai-active");
    document.getElementById("sb-copilot")?.click();
  } else if(tool==="minutas"){
    document.getElementById("mob-btn-min")?.classList.add("min-active");
    document.getElementById("sb-minutas")?.click();
  } else if(tool==="dashboard"){
    document.getElementById("sb-dashboard")?.click();
  }
  window._mobCloseSidebar();
};

/* ══ VISTA COPILOT IA ══ */
/* ── Convierte markdown básico a HTML limpio ── */
function mdToHtml(txt){
  if(!txt)return"";
  return txt
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/#{1,3}\s+(.+)/g,"<strong style='font-size:.85rem'>$1</strong>")
    .replace(/\n\n/g,"</p><p style='margin:5px 0'>")
    .replace(/\n/g,"<br>");
}

/* ── Genera ID de elemento seguro a partir de string ── */
function _safeId(str){ return str.replace(/[^a-zA-Z0-9_-]/g,"_"); }

async function abrirCopilotView(radicadoActivo, loadingTipo){
  actualizarBreadcrumb("__copilot__");
  const listEl=document.getElementById("mon-list"),pagEl=document.getElementById("mon-pag");
  if(!listEl)return;
  pagEl&&(pagEl.innerHTML="");
  /* Ocultar KPI/toolbar cuando están visibles */
  document.getElementById("kpi-row")?.style&&(document.getElementById("kpi-row").style.display="none");
  document.querySelector(".toolbar")?.style&&(document.querySelector(".toolbar").style.display="none");

  /* Estado de tabs y carpetas abiertas — siempre reinicia (todo cerrado) */
  const _tabs={};
  const _abiertos=new Set();
  /* Búsqueda por radicado — basta con un fragmento (ej. "202600140"). */
  let _cpQuery="";

  listEl.innerHTML=`<div style="padding:24px;color:var(--text3);font-size:.82rem;display:flex;align-items:center;gap:8px">${IC.spinner} Cargando Copilot IA…</div>`;
  const user=getUser(),cl=getClient();
  if(!user||!cl){listEl.innerHTML=`<div class="empty">${IC.ai}<h3>No autenticado</h3></div>`;return;}
  let data=[],err=null;
  try{
    const r=await cl.from("copiloto_consejos").select("id,radicado,despacho,resultado,created_at").eq("user_id",user.id).order("created_at",{ascending:false}).limit(300);
    if(r.error)err=r.error;else data=r.data||[];
  }catch(e){err=e;}
  if(err){listEl.innerHTML=`<div class="empty">${IC.alert}<h3>Error al cargar</h3><p>${escHtml(err.message||"")}</p></div>`;return;}

  /* Agrupar por radicado */
  const grupos={};
  data.forEach(item=>{
    const k=item.radicado||"Sin radicado";
    if(!grupos[k])grupos[k]={radicado:k,despacho:item.despacho||"",items:[]};
    grupos[k].items.push(item);
  });
  /* Solo mostrar procesos que siguen en seguimiento */
  const _radsActivos=new Set(seguimientos.map(s=>s.radicado));
  const entradas=Object.values(grupos).filter(g=>_radsActivos.has(g.radicado));

  if(!entradas.length){
    listEl.innerHTML=`<div class="empty">${IC.ai}<h3>Sin resultados guardados</h3><p>Usa <strong>Analizar actuaciones</strong> o <strong>Generar resumen</strong> en cualquier tarjeta para crear el primer resultado.</p></div>`;
    return;
  }

  /* Si el radicado activo aún no tiene resultados en DB, añadir grupo temporal de loading */
  if(loadingTipo && radicadoActivo && !grupos[radicadoActivo]){
    const seg=seguimientos.find(s=>s.radicado===radicadoActivo);
    grupos[radicadoActivo]={radicado:radicadoActivo,despacho:seg?.despacho||"",items:[],_loading:true};
    entradas.unshift(grupos[radicadoActivo]);
  }
  /* Si hay un radicado activo, abrirlo y mostrar loading si corresponde */
  if(radicadoActivo) _abiertos.add(radicadoActivo);

  function itemHtml(item, loadingEste){
    /* early return para estado de carga — ANTES de tocar item.* */
    if(loadingEste){
      return `<div class="ai-result-card" style="padding:14px 16px;display:flex;align-items:center;gap:10px">
        ${IC.spinner}<span style="color:var(--text3);font-size:.8rem">${loadingTipo==="resumen"?"Generando resumen…":"Analizando actuaciones…"}</span>
      </div>`;
    }
    if(!item)return"";
    const res=item.resultado||{};
    const tipo=res.tipo||"analisis";
    const fecha=new Date(item.created_at).toLocaleString("es-CO",{dateStyle:"short",timeStyle:"short"});
    if(tipo==="resumen"){
      const txtHtml=mdToHtml(res.texto||"");
      return `<div class="ai-result-card"><div style="padding:12px 16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="ai-badge ai-badge-etapa">Resumen</span>
          <span style="font-size:.62rem;color:var(--text4);margin-left:auto">${fecha}</span>
        </div>
        <div style="font-size:.8rem;line-height:1.75;color:var(--text2)"><p style="margin:0">${txtHtml}</p></div>
        <p style="margin:10px 0 0;font-size:.68rem;color:var(--text4)">⚠ Generado por IA. No reemplaza el criterio jurídico profesional.</p>
      </div></div>`;
    }else{
      const nivelColor={alta:"#dc2626",media:"#d97706",baja:"#16a34a"}[res.alertaNivel||"baja"];
      return `<div class="ai-result-card"><div style="padding:12px 16px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          <span class="ai-badge ai-badge-juzgado">Análisis</span>
          ${res.etapaProcesal?`<span class="ai-badge ai-badge-etapa">${escHtml(res.etapaProcesal)}</span>`:""}
          ${res.alertaNivel?`<span class="ai-badge" style="background:${nivelColor}18;color:${nivelColor};border-color:${nivelColor}40">${res.alertaNivel.toUpperCase()}</span>`:""}
          <span style="font-size:.62rem;color:var(--text4);margin-left:auto">${fecha}</span>
        </div>
        ${res.pasoASeguir?`<div style="margin-bottom:8px"><div class="ai-paso-lbl">Paso a seguir</div><div style="font-size:.8rem;line-height:1.65;color:var(--text);padding:8px 10px;background:var(--blue-xlt);border:1px solid var(--blue-lt);border-radius:var(--r)">${escHtml(res.pasoASeguir)}</div></div>`:""}
        ${res.termino?`<div style="margin-bottom:8px"><div class="ai-paso-lbl">Término / Plazo</div><div style="font-size:.8rem;color:var(--text2)">${escHtml(res.termino)}</div></div>`:""}
        ${res.fuentesLegales?.length?`<div><div class="ai-paso-lbl">Fuentes legales</div><ul style="margin:4px 0;padding-left:16px;font-size:.77rem;color:var(--text2);line-height:1.7">${res.fuentesLegales.map(f=>`<li>${escHtml(f)}</li>`).join("")}</ul></div>`:""}
        <p style="margin:10px 0 0;font-size:.68rem;color:var(--text4)">⚠ Generado por IA. Verifica con la norma vigente antes de actuar.</p>
      </div></div>`;
    }
  }

  function buildView(){
    const totalItems=entradas.reduce((s,g)=>s+g.items.length,0);
    const q=_normTxt(_cpQuery).replace(/\s+/g,"");
    const entradasVisibles=q
      ? entradas.filter(g=>_normTxt(g.radicado||"").includes(q))
      : entradas;
    listEl.innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;padding:4px 0 20px;border-bottom:1px solid var(--bdr);margin-bottom:4px">
        <span style="font-size:.7rem;font-weight:900;color:var(--purple);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px">${IC.ai} Copilot IA</span>
        <span style="font-size:.68rem;color:var(--text4)">${entradas.length} proceso${entradas.length!==1?"s":""} · ${totalItems} resultado${totalItems!==1?"s":""}</span>
      </div>
      ${entradas.length>1?`<div style="margin-bottom:14px">
        <input type="text" id="cp-buscar-radicado" placeholder="Buscar por número de radicado…" value="${escHtml(_cpQuery)}"
          style="width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:.8rem;font-family:var(--font);color:var(--text);background:var(--white)">
      </div>`:""}
      <div style="display:flex;flex-direction:column;gap:2px">
        ${entradasVisibles.length===0?`<p style="color:var(--text4);font-size:.78rem;padding:4px 0">Ningún proceso coincide con "${escHtml(_cpQuery)}".</p>`:entradasVisibles.map(g=>{
          const sid=_safeId(g.radicado);
          const abierto=_abiertos.has(g.radicado);
          const tab=_tabs[g.radicado]||"todos";
          const analisis=g.items.filter(i=>i.resultado?.tipo==="analisis"||!i.resultado?.tipo);
          const resumenes=g.items.filter(i=>i.resultado?.tipo==="resumen");
          const esElLoading=loadingTipo&&radicadoActivo===g.radicado;
          const visibles=tab==="analisis"?analisis:tab==="resumen"?resumenes:g.items;
          return `
          <div style="border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;margin-bottom:4px">
            <button onclick="window._cpToggle('${sid}')" style="width:100%;display:flex;align-items:center;gap:12px;padding:13px 18px;background:${abierto?"rgba(124,58,237,.04)":"var(--white)"};border:none;cursor:pointer;text-align:left;transition:background .15s">
              <span style="color:var(--purple);flex-shrink:0">${IC.ai}</span>
              <span style="font-size:.82rem;font-weight:700;color:var(--text);flex:1">${escHtml(g.radicado)}</span>
              ${g.despacho?`<span style="font-size:.68rem;color:var(--text3);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(g.despacho)}</span>`:""}
              <span style="font-size:.65rem;color:var(--text4);white-space:nowrap;flex-shrink:0">${g.items.length+(esElLoading?1:0)} resultado${g.items.length!==1?"s":""}</span>
              <span style="font-size:.7rem;color:var(--text4);flex-shrink:0">${abierto?"▲":"▼"}</span>
            </button>
            <div id="cp-body-${sid}" style="display:${abierto?"block":"none"}">
              <div style="display:flex;gap:0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);background:var(--bg)">
                ${[["todos","Todos ("+(g.items.length+(esElLoading?1:0))+")"],["analisis","Análisis ("+analisis.length+")"],["resumen","Resúmenes ("+resumenes.length+")"]].map(([v,lbl])=>`
                  <button onclick="window._cpTab('${sid}','${g.radicado.replace(/'/g,"\\'").replace(/\\/g,"\\\\")}','${v}')"
                    style="padding:8px 16px;font-size:.69rem;font-weight:700;border:none;border-bottom:2px solid ${tab===v?"var(--purple)":"transparent"};background:transparent;cursor:pointer;color:${tab===v?"var(--purple)":"var(--text3)"};">${lbl}</button>
                `).join("")}
              </div>
              <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
                ${esElLoading?itemHtml(null,true):""}

/* Exportar contenido del editor como PDF — descarga directa con jsPDF */
function _minExportarPdf(contenido, titulo){
  /* Carga diferida de jsPDF */
  function _generar(){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"p",unit:"mm",format:"a4"});
    const W=210,H=297,ML=22,MR=22,MT=22,MB=18;
    const TW=W-ML-MR;
    let y=MT;

    const tmp=document.createElement("div");
    tmp.innerHTML=contenido;

    function seg(text,opts){
      const fs=opts.size||11; const bold=opts.bold||false; const center=opts.center||false; const right=opts.right||false;
      doc.setFontSize(fs); doc.setFont("times",bold?"bold":"normal");
      const lh=fs*0.44+1.5;
      const lines=doc.splitTextToSize(text||"",TW);
      lines.forEach(ln=>{
        if(y+lh>H-MB){doc.addPage();y=MT;}
        const x=right?(W-MR):(center?W/2:ML);
        const opt=right?{align:"right"}:(center?{align:"center"}:{});
        doc.text(ln,x,y,opt);
        y+=lh;
      });
    }
    function sp(mm){y+=mm||4;}

    /* Lee la alineación aplicada por el editor (justifyLeft/Center/Right/Full vía
       execCommand suele fijar text-align inline en el bloque). El justificado se
       exporta como texto normal (jsPDF no soporta justificado real). */
    function _alineacion(node){
      const style=(node.getAttribute&&node.getAttribute("style"))||"";
      const ta=(node.style&&node.style.textAlign)||"";
      const txt=(style+" "+ta).toLowerCase();
      if(txt.includes("center")) return "center";
      if(txt.includes("right")) return "right";
      return "left";
    }

    function walk(node){
      if(!node)return;
      const tag=(node.nodeName||"").toLowerCase();
      if(node.nodeType===3){const t=node.textContent;if(t.trim())seg(t.trim(),{});return;}
      if(tag==="h1"){seg(node.textContent,{size:15,bold:true,center:true});sp(4);return;}
      if(tag==="h2"){seg(node.textContent,{size:13,bold:true});sp(3);return;}
      if(tag==="h3"){seg(node.textContent,{size:12,bold:true});sp(2);return;}
      if(tag==="p"){
        const t=node.textContent.trim();
        if(t){
          const al=_alineacion(node);
          seg(t,{center:al==="center",right:al==="right"});
        }
        sp(3); return;
      }
      if(tag==="br"){sp(4);return;}
      if(tag==="li"){seg("  • "+node.textContent.trim(),{});sp(1);return;}
      if(tag==="ul"||tag==="ol"){node.childNodes.forEach(walk);sp(2);return;}
      if(tag==="strong"||tag==="b"){seg(node.textContent.trim(),{bold:true});return;}
      if(tag==="em"||tag==="i"){seg(node.textContent.trim(),{});return;}
      node.childNodes.forEach(walk);
    }

    walk(tmp);
    doc.save((titulo||"minuta")+".pdf");
  }

  if(typeof window.jspdf!=="undefined"){_generar();return;}
  /* Cargar librería la primera vez */
  showToast("Preparando PDF…","");
  const s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload=()=>{_generar();};
  s.onerror=()=>{showToast("No se pudo cargar el exportador PDF. Verifica tu conexión.","error");};
  document.head.appendChild(s);
}
