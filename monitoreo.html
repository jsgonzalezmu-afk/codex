/* Función principal de la vista Minutas */
async function abrirMinutasView(radicadoActivo){
  actualizarBreadcrumb("__minutas__");
  const listEl=document.getElementById("mon-list"),pagEl=document.getElementById("mon-pag");
  if(!listEl)return;
  pagEl&&(pagEl.innerHTML="");
  document.getElementById("kpi-row")?.style&&(document.getElementById("kpi-row").style.display="none");
  document.querySelector(".toolbar")?.style&&(document.querySelector(".toolbar").style.display="none");

  const user=getUser(),cl=getClient();
  if(!user||!cl){
    listEl.innerHTML=`<div class="empty">${IC.fileDoc}<h3>No autenticado</h3><p>Inicia sesión para acceder a las minutas.</p></div>`;
    return;
  }

  /* Mostrar spinner mientras carga */
  listEl.innerHTML=`<div class="min-loading">${IC.spinner} Cargando minutas…</div>`;

  /* Cargar minutas del catálogo */
  let minutas=[];
  if(typeof window.minutasData!=="undefined"&&Array.isArray(window.minutasData)&&window.minutasData.length){
    minutas=window.minutasData;
  }else{
    try{
      const r=await cl.from("minutas").select("id,nombre,categoria,descripcion,archivo_url,docx_base64").order("categoria").limit(200);
      minutas=r.data||[];
    }catch(_){}
  }

  const seg=radicadoActivo?seguimientos.find(s=>s.radicado===radicadoActivo):null;

  /* Cargar último análisis del Copilot IA del proceso activo, para que el
     copiloto de Minutas sepa cuál es el paso a seguir del proceso */
  let pasoASeguir="";
  if(radicadoActivo){
    try{
      const r=await cl.from("copiloto_consejos")
        .select("resultado")
        .eq("user_id",user.id)
        .eq("radicado",radicadoActivo)
        .order("created_at",{ascending:false})
        .limit(5);
      const items=(r.data||[]).filter(x=>x.resultado?.tipo==="analisis"&&x.resultado?.pasoASeguir);
      if(items.length) pasoASeguir=items[0].resultado.pasoASeguir||"";
    }catch(_){}

    /* Si no hay ningún análisis guardado todavía, disparar el Copilot IA
       automáticamente (en silencio, sin navegar a la vista de Copilot) para
       que Minutas siempre tenga un paso a seguir sobre el cual sugerir —
       antes se quedaba pidiéndole al usuario que fuera a ejecutarlo a mano. */
    if(!pasoASeguir&&seg){
      listEl.innerHTML=`<div class="min-loading">${IC.spinner} Analizando el proceso con Copilot IA para ver qué minutas te sirven…</div>`;
      if(!actsCache[seg.id]?.length){ try{await cargarActs(seg);}catch(_){} }
      const res=await _ejecutarAnalisisIA(seg);
      if(res?.pasoASeguir) pasoASeguir=res.pasoASeguir;
    }
  }

  /* Coincidencia semántica: hasta 3 minutas relevantes según palabras clave del paso a seguir */
  const KWS=[
    ["apelación","apelacion","recurso de apelación"],
    ["recurso de reposición","reposicion"],
    ["recurso de queja","queja"],
    ["demanda","inadmision","subsanar"],
    ["memorial","sustentación"],
    ["notificación","aviso"],
    ["traslado","respuesta a traslado"],
    ["medida cautelar","embargo","secuestro"],
    ["poder","apoderado"],
    ["tutela","acción de tutela"],
    ["nulidad"],
    ["incidente"],
    ["contrato"],
  ];
  let sugeridas=[];
  if(pasoASeguir&&minutas.length){
    const paso=pasoASeguir.toLowerCase();
    for(const kwGroup of KWS){
      if(sugeridas.length>=3) break;
      if(!kwGroup.some(k=>paso.includes(k))) continue;
      const hits=minutas.filter(m=>{
        const txt=(m.nombre+" "+(m.descripcion||"")+" "+(m.categoria||"")).toLowerCase();
        return kwGroup.some(k=>txt.includes(k));
      });
      for(const h of hits){
        if(sugeridas.some(x=>x.id===h.id)) continue;
        sugeridas.push(h);
        if(sugeridas.length>=3) break;
      }
    }
  }

  /* Área/materia del proceso, deducida del despacho (civil, penal, laboral…),
     usada como respaldo cuando el paso a seguir no coincide con ninguna minuta
     por palabra clave: en vez de sugerir minutas de cualquier materia, mostramos
     solo las de la misma área del proceso (o avisamos que aún no hay para esa área). */
  const AREAS_PROCESO=[
    {kw:["laboral"],label:"Laboral",match:["laboral"]},
    {kw:["familia"],label:"Familia",match:["familia"]},
    {kw:["penal","penales"],label:"Penal",match:["penal"]},
    {kw:["administrativo"],label:"Administrativo",match:["administrativo"]},
    {kw:["comercial","mercantil"],label:"Comercial",match:["comercial","mercantil"]},
    {kw:["ejecucion de penas","ejecución de penas"],label:"Ejecución de penas",match:["penas","penal"]},
    {kw:["promiscuo"],label:"Civil y Penal",match:["civil","penal"]},
    {kw:["pequenas causas","pequeñas causas"],label:"Pequeñas Causas",match:["pequeñas causas","pequenas causas","civil"]},
    {kw:["civil"],label:"Civil",match:["civil"]},
  ];
  function _normTxt(t){return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
  function detectarAreaProceso(despachoTexto){
    const n=_normTxt(despachoTexto);
    if(!n) return null;
    for(const area of AREAS_PROCESO){ if(area.kw.some(k=>n.includes(k))) return area; }
    return null;
  }
  const areaProceso=detectarAreaProceso(seg?.despacho||"");
  let minutasDeArea=[];
  if(areaProceso&&minutas.length){
    minutasDeArea=minutas.filter(m=>{
      const txt=_normTxt((m.categoria||"")+" "+(m.nombre||""));
      return areaProceso.match.some(k=>txt.includes(_normTxt(k)));
    });
  }

  let minutaActual=sugeridas[0]||minutas[0]||null;
  /* "elegir" = seleccionar de cuál proceso se necesita ayuda (entrada directa desde el
        menú lateral, sin proceso concreto) · "chat" = el copiloto analiza el caso y
        sugiere minutas · "editor" = catálogo + editor.
     Solo saltamos directo al chat cuando venimos de un proceso concreto (desde una
     tarjeta o desde el selector). Si se entra por el menú "Minutas" sin proceso,
     primero preguntamos con cuál proceso se necesita ayuda — nunca mostramos el
     editor a ciegas. */
  let fase=radicadoActivo?"chat":(seguimientos.length?"elegir":"editor");
  /* Búsqueda por radicado en la pantalla "¿en qué proceso necesitas ayuda?" —
     basta con un fragmento del radicado (ej. "202600140"), no hace falta
     escribirlo completo. */
  let minQuery="";

  /* ── Iconos SVG compartidos por ambas fases ── */
  const svgDocBig=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`;
  const svgBack=`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
  const svgBold=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>`;
  const svgItalic=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>`;
  const svgUnder=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>`;
  const svgAlignL=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg>`;
  const svgAlignC=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="12" x2="7" y2="12"/><line x1="19" y1="18" x2="5" y2="18"/></svg>`;
  const svgAlignR=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="9" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/></svg>`;
  const svgAlignJ=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="3" y2="12"/><line x1="21" y1="18" x2="3" y2="18"/></svg>`;
  const svgList=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h.01M4 12h.01M4 18h.01"/></svg>`;
  const svgListNum=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2M4 18h2c0-1-2-1.5-2-2.5S5 14 6 14"/></svg>`;
  const svgIndentR=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 3 16"/><line x1="21" y1="6" x2="11" y2="6"/><line x1="21" y1="12" x2="11" y2="12"/><line x1="21" y1="18" x2="11" y2="18"/></svg>`;
  const svgIndentL=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 8 3 12 7 16"/><line x1="21" y1="6" x2="11" y2="6"/><line x1="21" y1="12" x2="11" y2="12"/><line x1="21" y1="18" x2="11" y2="18"/></svg>`;
  const svgUndo=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h10a5 5 0 0 1 0 10H8"/><polyline points="7 5 3 10 7 15"/></svg>`;
  const svgRedo=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10H11a5 5 0 0 0 0 10h5"/><polyline points="17 5 21 10 17 15"/></svg>`;

  /* ── Carga mammoth desde CDN si no está disponible ── */
  async function _asegurarMammoth(){
    if(typeof window.mammoth!=="undefined") return window.mammoth;
    return new Promise((res,rej)=>{
      if(document.getElementById("mammoth-cdn")) return res(window.mammoth);
      const s=document.createElement("script");
      s.id="mammoth-cdn";
      s.src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
      s.onload=()=>res(window.mammoth);
      s.onerror=rej;
      document.head.appendChild(s);
    });
  }

  /* ── Carga el DOCX real desde Supabase y lo muestra en el editor ── */
  async function _cargarDocxEnEditor(m, edEl){
    if(!m||!edEl) return;
    const url=m.archivo_url||m.archivoURL||null;
    const b64=m.docx_base64||m.docxBase64||null;
    if(!url&&!b64) return; /* sin fuente DOCX, mantener plantilla */

    const placeholder=document.createElement("div");
    placeholder.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.7);font-size:.82rem;color:var(--text3);gap:8px;border-radius:var(--r-md);z-index:2";
    placeholder.innerHTML="Cargando documento…";
    edEl.style.position="relative";
    edEl.appendChild(placeholder);

    try{
      const mammoth=await _asegurarMammoth();
      let html="";

      if(!html&&url){
        try{
          const r=await fetch(url);
          if(r.ok){
            const buf=await r.arrayBuffer();
            if(buf.byteLength>0){
              const res=await mammoth.convertToHtml({arrayBuffer:buf});
              html=res.value||"";
            }
          }
        }catch(_){}
      }

      if(!html&&b64){
        try{
          const binary=atob(b64);
          const bytes=new Uint8Array(binary.length);
          for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
          if(bytes.length>0){
            const res=await mammoth.convertToHtml({arrayBuffer:bytes.buffer});
            html=res.value||"";
          }
        }catch(_){}
      }

      if(html) edEl.innerHTML=html;
    }catch(_){
      /* Si falla mammoth, dejar la plantilla intacta */
    }
  }

  function irAEditor(m){
    if(m) minutaActual=m;
    fase="editor";
    renderFase();
  }
  function irAChat(){
    fase="chat";
    renderFase();
  }
  /* Elegir un proceso concreto desde el selector → recarga la vista completa con
     ese radicado, para que el Copiloto de Minutas cargue su análisis y sugiera
     minutas automáticamente (mismo flujo que abrirMinutasDesdeCard). */
  function irAChatConProceso(radicado){
    abrirMinutasView(radicado);
  }
  function renderFase(){
    if(fase==="elegir") renderElegirProceso();
    else if(fase==="chat") renderChat();
    else renderEditor();
  }

  /* ══ FASE 0 — ¿En qué proceso necesitas ayuda? (entrada directa por el menú) ══ */
  function renderElegirProceso(){
    /* Coincidencia por fragmento del radicado, sin tildes/espacios — así basta
       con un pedazo (ej. "202600140") en vez de escribir los 23 dígitos. */
    const q=_normTxt(minQuery).replace(/\s+/g,"");
    const seguimientosFiltrados=q
      ? seguimientos.filter(s=>_normTxt(s.radicado||"").includes(q)||_normTxt(s.alias||"").includes(q))
      : seguimientos;
    const procesosHtml=seguimientosFiltrados.map(s=>`
      <button type="button" class="min-proc-card" data-rad="${escHtml(s.radicado)}">
        <span class="min-proc-card-icon">${IC.fileDoc}</span>
        <span class="min-proc-card-body">
          <span class="min-proc-card-title">${escHtml(s.alias||s.radicado)}</span>
          ${s.alias?`<span class="min-proc-card-rad">${escHtml(s.radicado)}</span>`:""}
          ${s.despacho?`<span class="min-proc-card-desp">${IC.building} ${escHtml(s.despacho.trim())}</span>`:""}
        </span>
        <span class="min-proc-card-arrow">${svgBack.replace('points="15 18 9 12 15 6"','points="9 18 15 12 9 6"')}</span>
      </button>`).join("");

    listEl.innerHTML=`
      <div class="min-chat-wrap min-phase">
        <div class="min-chat-msg">
          <div class="min-chat-avatar">${IC.ai}</div>
          <div class="min-chat-bubble">
            <strong>¿En qué proceso necesitas ayuda?</strong>
            <p style="margin-top:6px;font-weight:400">Elige uno de tus procesos y el Copiloto de Minutas revisará su último análisis para sugerirte la minuta que corresponde al paso a seguir.</p>
          </div>
        </div>
        ${seguimientos.length>1?`<div class="am-search-wrap" style="margin-bottom:2px">
          <input type="text" id="min-buscar-proceso" placeholder="Buscar por número de radicado o alias…" value="${escHtml(minQuery)}"
            style="width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:.8rem;font-family:var(--font);color:var(--text);background:var(--white)">
        </div>`:""}
        <div class="min-proc-list">${procesosHtml.length?procesosHtml:`<p style="color:var(--text4);font-size:.78rem;padding:4px 0">Ningún proceso coincide con "${escHtml(minQuery)}".</p>`}</div>
        <div class="min-chat-actions" style="margin-top:4px">
          <button type="button" class="min-chat-link-btn" id="min-btn-sin-proceso">Prefiero ver el catálogo completo sin elegir un proceso</button>
        </div>
      </div>`;

    listEl.querySelectorAll(".min-proc-card[data-rad]").forEach(btn=>{
      btn.addEventListener("click",()=>irAChatConProceso(btn.dataset.rad));
    });
    document.getElementById("min-btn-sin-proceso")?.addEventListener("click",()=>{
      fase="editor";
      renderFase();
    });
    const inpBuscar=document.getElementById("min-buscar-proceso");
    if(inpBuscar){
      inpBuscar.focus();
      inpBuscar.setSelectionRange(inpBuscar.value.length,inpBuscar.value.length);
      inpBuscar.addEventListener("input",()=>{ minQuery=inpBuscar.value; renderElegirProceso(); });
    }
  }

  /* ══ FASE 1 — Copiloto de Minutas, presentado como conversación ══ */
  function renderChat(){
    const totalCatalogo=minutas.length;
    const tieneAnalisis=!!pasoASeguir;
    const hayCoincidencia=sugeridas.length>0;

    let mensajeIA="", cardsHtml="";

    if(!totalCatalogo){
      mensajeIA=`Revisé el proceso <strong>${escHtml(radicadoActivo||"")}</strong>, pero por el momento no tenemos minutas disponibles en el catálogo. Muy pronto incorporaremos nuevas plantillas y te las sugeriré automáticamente según el paso a seguir de cada caso.`;
    }else if(tieneAnalisis&&hayCoincidencia){
      mensajeIA=`Para este caso <strong>sí tenemos minutas</strong>. Según el último análisis del Copilot IA, el siguiente paso del proceso es: <em>"${escHtml(pasoASeguir.slice(0,160))}${pasoASeguir.length>160?"…":""}"</em>. Con base en eso, esta es la minuta que más se ajusta:`;
      cardsHtml=sugeridas.map((m,i)=>`
        <button type="button" class="min-chat-card${i===0?" min-chat-card-best":""}" data-mid="${escHtml(String(m.id))}">
          <span class="min-chat-card-icon">${IC.fileDoc}</span>
          <span class="min-chat-card-body">
            <span class="min-chat-card-name">${escHtml(m.nombre||"Sin nombre")}</span>
            <span class="min-chat-card-cat">${escHtml(m.categoria||"General")}</span>
          </span>
          ${i===0?`<span class="min-chat-card-badge">Recomendada</span>`:""}
        </button>`).join("");
    }else if(tieneAnalisis&&!hayCoincidencia){
      const pasoCorto=`<em>"${escHtml(pasoASeguir.slice(0,160))}${pasoASeguir.length>160?"…":""}"</em>`;
      if(areaProceso&&minutasDeArea.length){
        mensajeIA=`No encontré nada al respecto para el paso a seguir del proceso <strong>${escHtml(radicadoActivo||"")}</strong>: ${pasoCorto}. Sin embargo, aquí te muestro el menú de minutas relacionadas con procesos de <strong>${escHtml(areaProceso.label)}</strong>, que es la materia de este proceso — elige una y la ajustamos juntos:`;
        cardsHtml=minutasDeArea.slice(0,4).map(m=>`
          <button type="button" class="min-chat-card" data-mid="${escHtml(String(m.id))}">
            <span class="min-chat-card-icon">${IC.fileDoc}</span>
            <span class="min-chat-card-body">
              <span class="min-chat-card-name">${escHtml(m.nombre||"Sin nombre")}</span>
              <span class="min-chat-card-cat">${escHtml(m.categoria||"General")}</span>
            </span>
          </button>`).join("");
      }else if(areaProceso&&!minutasDeArea.length){
        /* No hay minutas para el área de este proceso. Como las minutas son un
           producto que vendemos (no plantillas personales que el usuario sube),
           en vez de dejarlo sin nada le ofrecemos como venta cruzada las minutas
           de la categoría con más disponibilidad en el catálogo. */
        const conteoPorCategoria={};
        minutas.forEach(m=>{
          const cat=(m.categoria||"").trim();
          if(cat) conteoPorCategoria[cat]=(conteoPorCategoria[cat]||0)+1;
        });
        let categoriaAlterna=null,maxCat=0;
        for(const[cat,n] of Object.entries(conteoPorCategoria)){ if(n>maxCat){maxCat=n;categoriaAlterna=cat;} }
        const minutasAlternas=categoriaAlterna?minutas.filter(m=>_normTxt(m.categoria||"")===_normTxt(categoriaAlterna)):[];
        if(minutasAlternas.length){
          /* categoriaAlterna es la categoría del CATÁLOGO con más plantillas
             disponibles (venta cruzada) — NO el tipo real del proceso. El tipo
             real del proceso (Civil, Laboral, etc.) ya lo tenemos en
             areaProceso.label, detectado a partir del despacho/juzgado. Antes
             el mensaje decía "para procesos de tipo <categoriaAlterna>", lo
             que hacía parecer que el proceso del usuario era de ese tipo
             (casi siempre "Arrendamiento", por ser la categoría más grande del
             catálogo) aunque en realidad fuera Civil, Laboral, etc. */
          mensajeIA=areaProceso
            ?`Tu proceso es de materia <strong>${escHtml(areaProceso.label)}</strong> y por ahora no tenemos minutas para esa materia en el catálogo. Mientras las incorporamos, te mostramos las de <strong>${escHtml(categoriaAlterna)}</strong>, que es la categoría con más plantillas disponibles, por si alguna te sirve de referencia:`
            :`No pudimos determinar la materia de tu proceso a partir del despacho, y por ahora no tenemos minutas para él en el catálogo. Mientras tanto, te mostramos las de <strong>${escHtml(categoriaAlterna)}</strong>, que es la categoría con más plantillas disponibles:`;
          cardsHtml=minutasAlternas.slice(0,4).map(m=>`
            <button type="button" class="min-chat-card" data-mid="${escHtml(String(m.id))}">
              <span class="min-chat-card-icon">${IC.fileDoc}</span>
              <span class="min-chat-card-body">
                <span class="min-chat-card-name">${escHtml(m.nombre||"Sin nombre")}</span>
                <span class="min-chat-card-cat">${escHtml(m.categoria||"General")}</span>
              </span>
            </button>`).join("");
        }else{
          mensajeIA=`Para este proceso no hay minutas disponibles en nuestro catálogo por el momento.`;
        }
      }else{
        mensajeIA=`No encontré nada al respecto para el paso a seguir del proceso <strong>${escHtml(radicadoActivo||"")}</strong>: ${pasoCorto}. Estas son algunas minutas del catálogo que podrían servirte — elige una y la ajustamos juntos:`;
        cardsHtml=minutas.slice(0,4).map(m=>`
          <button type="button" class="min-chat-card" data-mid="${escHtml(String(m.id))}">
            <span class="min-chat-card-icon">${IC.fileDoc}</span>
            <span class="min-chat-card-body">
              <span class="min-chat-card-name">${escHtml(m.nombre||"Sin nombre")}</span>
              <span class="min-chat-card-cat">${escHtml(m.categoria||"General")}</span>
            </span>
          </button>`).join("");
      }
    }else{
      mensajeIA=`Aún no tengo un análisis del Copilot IA para el proceso <strong>${escHtml(radicadoActivo||"")}</strong>, así que no puedo identificar con certeza el paso a seguir. Ejecuta <strong>Copilot IA → Analizar actuaciones</strong> para obtener una recomendación precisa, o elige directamente una minuta del catálogo mientras tanto:`;
      cardsHtml=minutas.slice(0,4).map(m=>`
        <button type="button" class="min-chat-card" data-mid="${escHtml(String(m.id))}">
          <span class="min-chat-card-icon">${IC.fileDoc}</span>
          <span class="min-chat-card-body">
            <span class="min-chat-card-name">${escHtml(m.nombre||"Sin nombre")}</span>
            <span class="min-chat-card-cat">${escHtml(m.categoria||"General")}</span>
          </span>
        </button>`).join("");
    }

    listEl.innerHTML=`
      <div class="min-chat-wrap min-phase">
        <div class="min-chat-msg">
          <div class="min-chat-avatar">${IC.fileDoc}</div>
          <div class="min-chat-bubble">Analizando el proceso <strong>${escHtml(radicadoActivo||"")}</strong>${seg?.despacho?` (${escHtml(seg.despacho.trim())})`:""} para ver qué minutas te sirven…
            <div class="min-chat-typing"><span></span><span></span><span></span></div>
          </div>
        </div>
        <div class="min-chat-msg">
          <div class="min-chat-avatar">${IC.ai}</div>
          <div class="min-chat-bubble">
            ${mensajeIA}
            ${cardsHtml?`<div class="min-chat-cards">${cardsHtml}</div>`:""}
            ${totalCatalogo?`<div class="min-chat-actions"><button type="button" class="min-chat-link-btn" id="min-btn-catalogo">Ver todo el catálogo (${totalCatalogo})</button></div>`:""}
          </div>
        </div>
      </div>`;

    listEl.querySelectorAll(".min-chat-card[data-mid]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const found=minutas.find(m=>String(m.id)===btn.dataset.mid);
        if(found) irAEditor(found);
      });
    });
    document.getElementById("min-btn-catalogo")?.addEventListener("click",()=>irAEditor(null));
  }

      </div>`:"";

              <select class="min-font-sel" id="min-sel-size" title="Tamaño" style="width:54px">
                <option value="10pt">10</option>
                <option value="11pt">11</option>

              <button class="min-tool-btn" data-cmd="justifyRight" title="Alinear derecha">${svgAlignR}</button>
              <button class="min-tool-btn" data-cmd="justifyFull" title="Justificar">${svgAlignJ}</button>
              <div class="min-sep"></div>
              <button class="min-tool-btn" data-cmd="outdent" title="Reducir sangría">${svgIndentL}</button>
              <button class="min-tool-btn" data-cmd="indent" title="Aumentar sangría">${svgIndentR}</button>

          <p class="min-disclaimer">El contenido del editor es solo una plantilla. Revisa y ajusta los datos antes de descargar. El PDF conserva negrita, cursiva y alineación centrada/derecha; el justificado se exporta como texto normal.</p>
        </div>
      </div>
    </div>`;

    /* ── Eventos del editor ── */
    const edEl=document.getElementById(editorId);

    listEl.querySelectorAll(".min-tool-btn[data-cmd]").forEach(btn=>{
      btn.addEventListener("mousedown",e=>{
        e.preventDefault();
        document.execCommand(btn.dataset.cmd,false,null);
        edEl?.focus();
      });
    });

    document.getElementById("min-color-text")?.addEventListener("input",e=>{
      document.execCommand("styleWithCSS",false,true);
      document.execCommand("foreColor",false,e.target.value);
      edEl?.focus();
    });
    document.getElementById("min-color-mark")?.addEventListener("input",e=>{
      document.execCommand("styleWithCSS",false,true);
      document.execCommand("hiliteColor",false,e.target.value);
      edEl?.focus();
    });

    document.getElementById("min-sel-font")?.addEventListener("change",e=>{
      document.execCommand("fontName",false,e.target.value);
      edEl?.focus();
    });

    document.getElementById("min-sel-size")?.addEventListener("change",e=>{
      document.execCommand("styleWithCSS",false,true);
      document.execCommand("fontSize",false,"3");
      const spans=edEl?.querySelectorAll("font[size='3']");
      spans?.forEach(sp=>{sp.removeAttribute("size");sp.style.fontSize=e.target.value;});
      edEl?.focus();
    });

    document.getElementById("min-btn-docx")?.addEventListener("click",()=>{
      const contenido=document.getElementById(editorId)?.innerHTML||"";
      _minExportarDocx(contenido, minutaActual?.nombre||"Minuta");
    });

    document.getElementById("min-btn-pdf")?.addEventListener("click",()=>{
      const contenido=document.getElementById(editorId)?.innerHTML||"";
      _minExportarPdf(contenido, minutaActual?.nombre||"Minuta");
    });

    document.getElementById("min-list-items")?.addEventListener("click",e=>{
      const item=e.target.closest(".min-list-item");
      if(!item)return;
      const mid=item.dataset.mid;
      const found=minutas.find(m=>String(m.id)===mid);
      if(!found||found.id===minutaActual?.id)return;
      minutaActual=found;
      renderEditor();
    });

    document.getElementById("min-btn-volver")?.addEventListener("click",irAChat);

    if(minutaActual){
      const edElReal=document.getElementById(editorId);
      if(edElReal) _cargarDocxEnEditor(minutaActual, edElReal);
    }
  }

  renderFase();
}

/* ══ DASHBOARD ══ */
async function abrirDashboard(){
  actualizarBreadcrumb("__dashboard__");
  const listEl=document.getElementById("mon-list"),pagEl=document.getElementById("mon-pag");
  if(!listEl)return;
  pagEl&&(pagEl.innerHTML="");
  document.getElementById("kpi-row")?.style&&(document.getElementById("kpi-row").style.display="none");
  document.querySelector(".toolbar")?.style&&(document.querySelector(".toolbar").style.display="none");
  listEl.innerHTML=`<div style="padding:24px;display:flex;align-items:center;gap:8px;color:var(--text3);font-size:.82rem">${IC.spinner} Cargando dashboard…</div>`;

  const user=getUser(),cl=getClient();
  if(!user||!cl){listEl.innerHTML=`<div class="empty">${IC.alert}<h3>No autenticado</h3></div>`;return;}

  /* ── Saludo personalizado ── */
  const h=new Date().getHours();
  const saludo=h<12?"Buenos días":h<18?"Buenas tardes":"Buenas noches";
  const nombre=escHtml(user.user_metadata?.full_name||user.email?.split("@")[0]||"");
  const nombreFmt=nombre?`, ${nombre.split(" ")[0]}`:"";

  /* ── Cargar logs de los últimos 30 días + estadísticas IA (paralelo) ── */
  const hace30=new Date(Date.now()-30*86400000).toISOString();
  let logData=[]; let aiStat={analisis:0,resumen:0,total:0}; let recientes=[];
  try{
    const [rLogs,rAI,rRecientes]=await Promise.all([
      cl.from("consulta_logs").select("ts,total,fallos").eq("user_id",user.id).gte("ts",hace30).order("ts",{ascending:true}).limit(500),
      cl.from("copiloto_consejos").select("resultado").eq("user_id",user.id).limit(1000),
      cl.from("consulta_logs").select("ts,total,fallos,error_msg").eq("user_id",user.id).order("ts",{ascending:false}).limit(6)
    ]);
    logData=rLogs.data||[];
    recientes=rRecientes.data||[];
    (rAI.data||[]).forEach(row=>{
      aiStat.total++;
      if(row.resultado?.tipo==="resumen") aiStat.resumen++;
      else aiStat.analisis++;
    });
  }catch(_){}

  /* ── Agrupar logs por día ── */
  const porDia={};
  logData.forEach(l=>{
    const dia=l.ts.slice(0,10);
    if(!porDia[dia])porDia[dia]={total:0,fallos:0,consultas:0};
    porDia[dia].consultas++;
    porDia[dia].total+=l.total||0;
    porDia[dia].fallos+=l.fallos||0;
  });

  /* Generar rango de 30 días */
  const dias30=[];
  for(let i=29;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    dias30.push({fecha:d.toISOString().slice(0,10),d});
  }
  const vals=dias30.map(d=>porDia[d.fecha]?.total||0);
  const maxV=Math.max(...vals,1);

  /* ── KPIs ── */
  const total=seguimientos.length;
  const novedad=seguimientos.filter(s=>s.tiene_cambios).length;
  const conPub=seguimientos.filter(s=>s.tiene_publicacion_nueva).length;
  const inact=seguimientos.filter(s=>clasificar(s)==="inactivo").length;
  const activos=seguimientos.filter(s=>clasificar(s)==="activo"||clasificar(s)==="novedad").length;
  const totalConsultas=logData.length;
  const totalFallos=logData.reduce((s,l)=>s+(l.fallos||0),0);
  const errRate=totalConsultas?Math.round(totalFallos/totalConsultas*100):0;

  /* ── SVG Line Chart ── */
  const W=560,H=120,PL=28,PR=12,PT=12,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const pts=vals.map((v,i)=>[PL+i*(cW/(vals.length-1||1)), PT+cH-(v/maxV*cH)]);
  const pathD=pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const areaD=`${pathD} L${pts[pts.length-1][0].toFixed(1)},${(PT+cH).toFixed(1)} L${pts[0][0].toFixed(1)},${(PT+cH).toFixed(1)} Z`;

  /* Etiquetas eje X — solo primero, medio y último */
  const xLabels=[0,14,29].map(i=>{
    const {d}=dias30[i];
    return `<text x="${(PL+i*(cW/(vals.length-1||1))).toFixed(1)}" y="${H}" text-anchor="middle" font-size="9" fill="#94a3b8">${d.getDate()} ${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()]}</text>`;
  }).join("");

  /* Y labels */
  const yLabels=[0,Math.round(maxV/2),maxV].map(v=>{
    const y=(PT+cH-(v/maxV*cH)).toFixed(1);
    return `<text x="${PL-4}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#94a3b8">${v}</text>`;
  }).join("");

  /* Puntos destacados con tooltip */
  const dotsHtml=pts.map((p,i)=>vals[i]>0?`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="5" fill="#7c3aed" opacity="0" style="cursor:pointer" data-tip="${dias30[i].fecha}: ${vals[i]} consulta${vals[i]!==1?"s":""}"></circle><circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.8" fill="#7c3aed" opacity=".8" style="pointer-events:none"></circle>`:"").join("");

  /* Distribución por estado */
  const distData=[
    {lbl:"Con novedad",n:novedad,color:"#c9a84c"},
    {lbl:"Activos",n:activos-novedad,color:"#16a34a"},
    {lbl:"Sin actividad",n:inact,color:"#94a3b8"},
  ].filter(d=>d.n>0);
  const distTotal=distData.reduce((s,d)=>s+d.n,0)||1;
  let arc=0;
  const slices=distData.map(d=>{
    const pct=d.n/distTotal;
    const a1=arc*2*Math.PI-Math.PI/2;
    arc+=pct;
    const a2=arc*2*Math.PI-Math.PI/2;
    const r=44,cx=54,cy=54;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=pct>.5?1:0;
    return `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${d.color}" opacity=".85" style="cursor:pointer" data-tip="${d.lbl}: ${d.n}"></path>`;
  }).join("");

  /* ── AI Donut ── */
  const aiDonutData=[];
  if(aiStat.analisis>0)aiDonutData.push({lbl:"Análisis",n:aiStat.analisis,color:"#7c3aed"});
  if(aiStat.resumen>0) aiDonutData.push({lbl:"Resúmenes",n:aiStat.resumen, color:"#2563a8"});
  const aiTot=aiStat.total||1;
  let aiArc2=0;
  const aiSlices=aiDonutData.map(d=>{
    const pct=d.n/aiTot;
    const a1=aiArc2*2*Math.PI-Math.PI/2; aiArc2+=pct;
    const a2=aiArc2*2*Math.PI-Math.PI/2;
    const r=44,cx=54,cy=54;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=pct>.5?1:0;
    return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${d.color}" opacity=".85" style="cursor:pointer" data-tip="${d.lbl}: ${d.n}"></path>`;
  }).join("");

  /* ── Render ── */
  listEl.innerHTML=`
  <div style="max-width:900px;margin:0 auto">
    <!-- Saludo -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px">
      <div>
        <h2 style="margin:0;font-size:1.35rem;font-weight:800;color:var(--text)">${saludo}${nombreFmt}</h2>
        <p style="margin:4px 0 0;font-size:.82rem;color:var(--text3)">Tu centro de monitoreo legal en tiempo real</p>
      </div>
      <button class="tb-btn" onclick="window._dashNewProc()" style="flex-shrink:0">${IC.plus} Nuevo proceso</button>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px">
      ${[
        {ico:IC.folder,val:total,lbl:"Total procesos",   color:"#3b82f6",bg:"rgba(59,130,246,.08)"},
        {ico:IC.bell,  val:novedad,lbl:"Novedades RJ",   color:"#c9a84c",bg:"rgba(201,168,76,.08)"},
        {ico:IC.news,  val:conPub, lbl:"Publicaciones PP",color:"#f59e0b",bg:"rgba(245,158,11,.08)"},
        {ico:IC.clockOff,val:inact,lbl:"Sin actividad +90d",color:"#16a34a",bg:"rgba(22,163,74,.08)"},
      ].map(k=>`
        <div style="background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-md);padding:16px 18px;display:flex;align-items:center;gap:14px">
          <div style="width:40px;height:40px;border-radius:var(--r);background:${k.bg};display:flex;align-items:center;justify-content:center;color:${k.color};flex-shrink:0">${k.ico}</div>
          <div>
            <div style="font-size:1.5rem;font-weight:800;color:var(--text);line-height:1">${k.val}</div>
            <div style="font-size:.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:3px">${k.lbl}</div>
          </div>
        </div>
      `).join("")}
    </div>

    <!-- Gráficas -->
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px">
      <!-- Línea: actividad -->
      <div style="background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-md);padding:18px 20px">
        <div style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:14px">Verificaciones últimos 30 días</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
          <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c3aed" stop-opacity=".25"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></linearGradient></defs>
          <path d="${areaD}" fill="url(#lg1)"/>
          <path d="${pathD}" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${dotsHtml}
          ${yLabels}${xLabels}
        </svg>
        <div style="display:flex;gap:20px;margin-top:8px">
          ${[
            {lbl:"Total",val:totalConsultas},
            {lbl:"Promedio/día",val:(totalConsultas/30).toFixed(1)},
            {lbl:"Con errores",val:totalFallos},
            {lbl:"Tasa error",val:errRate+"%"},
          ].map(s=>`<div><div style="font-size:.95rem;font-weight:800;color:var(--text)">${s.val}</div><div style="font-size:.63rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${s.lbl}</div></div>`).join("")}
        </div>
      </div>

      <!-- Columna derecha: distribución + utilización IA -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <!-- Donut: distribución -->
        <div style="background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-md);padding:18px 20px">
          <div style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:14px">Distribución procesos</div>
          <div style="display:flex;align-items:center;gap:16px">
            <svg viewBox="0 0 108 108" style="width:90px;flex-shrink:0">
              <circle cx="54" cy="54" r="44" fill="var(--bg)"/>
              ${distTotal>0?slices:`<circle cx="54" cy="54" r="44" fill="#e2e8f0"/>`}
              <circle cx="54" cy="54" r="28" fill="var(--white)"/>
              <text x="54" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="#1e293b">${total}</text>
              <text x="54" y="63" text-anchor="middle" font-size="8" fill="#94a3b8">total</text>
            </svg>
            <div style="display:flex;flex-direction:column;gap:7px;flex:1">
              ${distData.map(d=>`
                <div style="display:flex;align-items:center;gap:7px">
                  <div style="width:9px;height:9px;border-radius:50%;background:${d.color};flex-shrink:0"></div>
                  <span style="font-size:.72rem;color:var(--text2);flex:1">${d.lbl}</span>
                  <span style="font-size:.72rem;font-weight:700;color:var(--text)">${d.n}</span>
                </div>`).join("")}
              ${distData.length===0?`<p style="font-size:.75rem;color:var(--text4)">Sin datos aún</p>`:""}
            </div>
          </div>
        </div>

        <!-- Tarjeta: Utilización de IA -->
        <div style="background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-md);padding:18px 20px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <span style="color:var(--purple)">${IC.ai}</span>
            <span style="font-size:.78rem;font-weight:700;color:var(--text)">Utilización de IA</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <svg viewBox="0 0 108 108" style="width:90px;flex-shrink:0">
              <circle cx="54" cy="54" r="44" fill="var(--bg)"/>
              ${aiStat.total>0?aiSlices:`<circle cx="54" cy="54" r="44" fill="#e2e8f0"/>`}
              <circle cx="54" cy="54" r="28" fill="var(--white)"/>
              <text x="54" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="#1e293b">${aiStat.total}</text>
              <text x="54" y="63" text-anchor="middle" font-size="8" fill="#94a3b8">consultas</text>
            </svg>
            <div style="display:flex;flex-direction:column;gap:7px;flex:1">
              ${[
                {lbl:"Análisis",n:aiStat.analisis,color:"#7c3aed",pct:aiStat.total?Math.round(aiStat.analisis/aiStat.total*100):0},
                {lbl:"Resúmenes",n:aiStat.resumen,color:"#2563a8",pct:aiStat.total?Math.round(aiStat.resumen/aiStat.total*100):0},
              ].map(item=>`
                <div style="display:flex;align-items:center;gap:7px">
                  <div style="width:9px;height:9px;border-radius:50%;background:${item.color};flex-shrink:0"></div>
                  <span style="font-size:.72rem;color:var(--text2);flex:1">${item.lbl}</span>
                  <span style="font-size:.68rem;color:var(--text4);margin-right:4px">${item.pct}%</span>
                  <span style="font-size:.72rem;font-weight:700;color:var(--text)">${item.n}</span>
                </div>`).join("")}
              ${aiDonutData.length===0?`<p style="font-size:.72rem;color:var(--text4)">Aún no has usado el Copilot IA.</p>`:""}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Últimas verificaciones -->
    <div style="background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-md);padding:18px 20px">
      <div style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:14px">Últimas actuaciones</div>
      ${recientes.map(l=>{
        const err=(l.fallos||0)>0||l.error_msg;
        const fecha=new Date(l.ts).toLocaleString("es-CO",{dateStyle:"short",timeStyle:"short"});
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bdr)">
          <div style="width:7px;height:7px;border-radius:50%;background:${err?"#dc2626":"#16a34a"};flex-shrink:0"></div>
          <span style="font-size:.75rem;color:var(--text3);flex-shrink:0">${fecha}</span>
          <span style="font-size:.75rem;color:var(--text);flex:1">${l.total||0} proceso${(l.total||0)!==1?"s":""} verificados${(l.fallos||0)>0?" · "+(l.fallos||0)+" error(es)":""}</span>
          <span style="font-size:.65rem;font-weight:700;color:${err?"#dc2626":"#16a34a"};padding:2px 8px;border-radius:99px;background:${err?"rgba(220,38,38,.09)":"rgba(22,163,74,.09)"}">${err?"Error":"OK"}</span>
        </div>`;
      }).join("")}
      ${!recientes.length?`<p style="font-size:.78rem;color:var(--text4);padding:4px 0">Sin actuaciones en los últimos 30 días.</p>`:""}
    </div>
  </div>`;

  window._dashNewProc=function(){
    abrirModalAgregar();
  };
}

window.iniciarMonitoreo=iniciarMonitoreo;
window.reiniciarMonitoreo=function(){ activo=false;seguimientos=[];actsCache={};pubsCache={};filtro="__dashboard__";busqueda="";pagina=1;logsPag=1;iniciarMonitoreo(); };

})();
</script>
</body>
</html>
