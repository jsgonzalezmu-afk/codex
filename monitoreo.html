<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo Jurídico — Minutas Legales Colombia</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ─── Reset & Tokens ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #1a3a5c;
      --blue-mid:   #2563a8;
      --blue-dark:  #0d2540;
      --blue-lt:    #eaf1fb;
      --blue-xlt:   #f3f7fd;
      --gold:       #c9a84c;
      --gold-dk:    #a8893a;
      --gold-bg:    #fdf8ed;
      --white:      #ffffff;
      --bg:         #f0f3f8;
      --bg-card:    #ffffff;
      --bdr:        #dde3ec;
      --bdr-mid:    #c8d3e2;
      --text:       #0f1923;
      --text2:      #354a61;
      --text3:      #6e8499;
      --text4:      #a8bccf;
      --green:      #16a34a;
      --green-lt:   #dcfce7;
      --green-dk:   #166534;
      --amber:      #d97706;
      --amber-lt:   #fef3c7;
      --red:        #dc2626;
      --red-lt:     #fee2e2;
      --purple:     #7c3aed;
      --src-rj:     #16a34a;
      --src-pp:     #d97706;
      --src-off:    #94a3b8;
      --sh-xs: 0 1px 3px rgba(15,25,35,.06),0 1px 2px rgba(15,25,35,.04);
      --sh-sm: 0 4px 12px rgba(15,25,35,.08),0 1px 4px rgba(15,25,35,.05);
      --sh-md: 0 8px 24px rgba(15,25,35,.11),0 2px 8px rgba(15,25,35,.06);
      --sh-lg: 0 20px 48px rgba(15,25,35,.16),0 4px 16px rgba(15,25,35,.08);
      --sh-blue: 0 0 0 3px rgba(37,99,168,.15);
      --r-xs:2px; --r-sm:5px; --r:8px; --r-md:10px; --r-lg:14px;
      --dur:.18s; --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1);
      --sb-w:226px; --hdr-h:54px;
      --font:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
      --font-d:"Cormorant Garamond",Georgia,serif;
    }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes shimmer  { to { background-position:-200% 0; } }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @keyframes pulseBdr { 0%,100%{box-shadow:var(--sh-xs)} 50%{box-shadow:0 0 0 3px rgba(37,99,168,.18),var(--sh-sm)} }
    @keyframes barSweep { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    @keyframes stepIn   { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
    @keyframes checkIn  { from{transform:scale(0)} to{transform:scale(1)} }
    @keyframes scanPulse{ 0%,100%{opacity:.7} 50%{opacity:1} }

    html { scroll-behavior:smooth; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh; }
    ::selection { background:#f0e0a0; color:var(--blue-dark); }
    a { color:inherit; text-decoration:none; }
    button { font-family:var(--font); cursor:pointer; }

    /* ─── App Shell ─── */
    #app { display:flex; min-height:100vh; }

    /* ─── Sidebar ─── */
    #sidebar {
      width:var(--sb-w); min-height:100vh; background:var(--white);
      border-right:1px solid var(--bdr); display:flex; flex-direction:column;
      position:fixed; top:0; left:0; bottom:0; z-index:200;
      box-shadow:2px 0 12px rgba(15,25,35,.05);
    }
    .sb-logo { display:flex; align-items:center; gap:11px; padding:16px 18px 14px; border-bottom:1px solid var(--bdr); }
    .sb-logo-icon { width:36px; height:36px; background:var(--blue); border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 3px 10px rgba(26,58,92,.3); }
    .sb-logo-name { font-family:var(--font-d); font-size:1rem; font-weight:700; color:var(--blue); display:block; line-height:1.2; }
    .sb-logo-sub  { font-size:.58rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-dk); display:block; }

    .sb-nav { padding:8px 10px; flex:1; overflow-y:auto; }
    .sb-sec  { font-size:.57rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--text4); padding:8px 8px 2px; display:block; }
    .sb-item {
      display:flex; align-items:center; gap:9px; padding:7px 10px;
      border-radius:var(--r); background:none; border:none; width:100%;
      text-align:left; color:var(--text3); font-size:.81rem; font-weight:500;
      transition:background var(--dur),color var(--dur); white-space:nowrap;
    }
    .sb-item:hover { background:var(--bg); color:var(--text2); }
    .sb-item.active { background:var(--blue-lt); color:var(--blue); font-weight:600; }
    .sb-item .ico   { flex-shrink:0; color:var(--text4); transition:color var(--dur); }
    .sb-item:hover .ico,.sb-item.active .ico { color:currentColor; }
    .sb-count {
      margin-left:auto; font-size:.64rem; font-weight:700; min-width:20px;
      text-align:center; padding:1px 6px; border-radius:99px;
      background:var(--bg); color:var(--text3);
    }
    .sb-item.active .sb-count { background:rgba(37,99,168,.12); color:var(--blue); }
    .nav-count-err { background:rgba(220,38,38,.13) !important; color:#dc2626 !important; font-weight:800 !important; }
    .sb-item.ai-item { color:var(--purple); }
    .sb-item.ai-item:hover { background:rgba(124,58,237,.08); color:var(--purple); }
    .sb-item.ai-item.active { background:rgba(124,58,237,.12); color:var(--purple); }
    .sb-item.excel-item { color:var(--green-dk); }
    .sb-item.dash-item  { color:#0ea5e9; }
    .sb-item.dash-item:hover  { background:rgba(14,165,233,.08); }
    .sb-item.dash-item.active { background:rgba(14,165,233,.12); color:#0284c7; }
    .sb-item.excel-item:hover { background:rgba(22,163,74,.08); color:var(--green-dk); }

    .sb-divider { height:1px; background:var(--bdr); margin:5px 10px; }

    .sb-footer { padding:10px; display:flex; flex-direction:column; gap:6px; }
    .sb-btn-add {
      display:flex; align-items:center; gap:8px; padding:10px 14px;
      background:var(--blue); color:var(--white); border:none; border-radius:var(--r);
      font-size:.8rem; font-weight:700;
      box-shadow:0 4px 14px rgba(26,58,92,.3);
      transition:background var(--dur),box-shadow var(--dur),transform var(--dur);
    }
    .sb-btn-add:hover { background:var(--blue-dark); box-shadow:0 6px 20px rgba(26,58,92,.4); transform:translateY(-1px); }
    .sb-btn-logout {
      display:flex; align-items:center; gap:8px; padding:8px 12px;
      background:none; border:1px solid #fca5a5; border-radius:var(--r);
      font-size:.77rem; font-weight:600; color:var(--red);
      transition:background var(--dur),border-color var(--dur);
    }
    .sb-btn-logout:hover { background:var(--red-lt); border-color:var(--red); }

    /* ─── Main ─── */
    #main { margin-left:var(--sb-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

    #topbar {
      height:var(--hdr-h); background:var(--white); border-bottom:1px solid var(--bdr);
      display:flex; align-items:center; padding:0 22px; gap:14px;
      position:sticky; top:0; z-index:100; box-shadow:var(--sh-xs);
    }
    .tb-bread { font-size:.72rem; color:var(--text3); display:flex; align-items:center; gap:5px; }
    .tb-cur   { font-weight:600; color:var(--text); font-size:.92rem; }
    .tb-sep   { opacity:.4; }
    .tb-sp    { flex:1; }
    .tb-plan  { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:99px; font-size:.69rem; font-weight:600; }
    .tb-plan-basic   { background:var(--bg); color:var(--text3); border:1px solid var(--bdr); }
    .tb-plan-premium { background:rgba(201,168,76,.13); color:var(--gold-dk); border:1px solid rgba(201,168,76,.28); }
    .tb-back {
      display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
      border:1px solid var(--bdr); border-radius:var(--r); font-size:.73rem; font-weight:600; color:var(--text3);
      transition:all var(--dur); background:none;
    }
    .tb-back:hover { background:var(--blue-lt); border-color:var(--blue-mid); color:var(--blue); }

    #page { padding:20px 22px; flex:1; }

    /* ─── Loading Screen ─── */
    #page-loading {
      position:fixed; inset:0; background:var(--white); display:flex;
      flex-direction:column; align-items:center; justify-content:center; gap:15px;
      z-index:9000; transition:opacity .3s var(--ease-out);
    }
    #page-loading.hidden { opacity:0; pointer-events:none; }
    .pl-icon { width:56px; height:56px; background:var(--blue); border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 28px rgba(26,58,92,.32); }
    .pl-name  { font-family:var(--font-d); font-size:1.5rem; font-weight:700; color:var(--blue); }
    .pl-sub   { font-size:.69rem; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); font-weight:600; }
    .spinner  { width:24px; height:24px; border:2px solid var(--bdr); border-top-color:var(--gold); border-radius:50%; animation:spin .85s linear infinite; display:inline-block; flex-shrink:0; }

    /* ─── Refresh Progress Bar ─── */
    #refresh-bar {
      display:none; position:sticky; top:var(--hdr-h); z-index:90;
      background:linear-gradient(135deg,var(--blue-dark),var(--blue));
      color:var(--white); padding:10px 22px;
      box-shadow:0 4px 16px rgba(26,58,92,.25);
      animation:fadeUp .22s var(--ease-out);
    }
    .rbar-inner   { display:flex; align-items:center; gap:14px; max-width:900px; }
    .rbar-spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    .rbar-label   { font-size:.8rem; font-weight:600; flex:1; }
    .rbar-pct     { font-size:.75rem; font-weight:700; color:var(--gold); min-width:36px; text-align:right; }
    .rbar-track   { flex:1; height:4px; background:rgba(255,255,255,.2); border-radius:99px; overflow:hidden; }
    .rbar-fill    { height:100%; background:var(--gold); border-radius:99px; transition:width .4s var(--ease-out); transform-origin:left; }

    /* ─── KPI Row ─── */
    .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:16px; }
    .kpi {
      background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r-lg);
      padding:15px 17px; display:flex; align-items:center; gap:13px; cursor:pointer;
      transition:box-shadow var(--dur),border-color var(--dur),transform var(--dur);
      box-shadow:var(--sh-xs); user-select:none;
    }
    .kpi:hover { box-shadow:var(--sh-sm); border-color:var(--bdr-mid); transform:translateY(-2px); }
    .kpi-icon  { width:42px; height:42px; border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .kpi-blue .kpi-icon  { background:var(--blue-lt); color:var(--blue); }
    .kpi-gold .kpi-icon  { background:var(--gold-bg); color:var(--gold-dk); }
    .kpi-green .kpi-icon { background:var(--green-lt); color:var(--green); }
    .kpi-amber .kpi-icon { background:var(--amber-lt); color:var(--amber); }
    .kpi-val   { font-family:Arial,Helvetica,sans-serif; font-size:1.9rem; font-weight:700; line-height:1; color:var(--blue); }
    .kpi-gold  .kpi-val { color:var(--gold-dk); }
    .kpi-green .kpi-val { color:var(--green); }
    .kpi-amber .kpi-val { color:var(--amber); }
    .kpi-lbl   { font-size:.63rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); margin-top:2px; }

    .skel { background:linear-gradient(90deg,var(--bg) 25%,var(--bdr) 50%,var(--bg) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--r); }
    .kpi.skel-kpi { min-height:76px; border:none; pointer-events:none; }

    /* ─── Process Card Skeleton (buscando PP) ─── */
    .pcard-loading { pointer-events:none; }
    .pcard-loading::before { background:var(--blue-mid) !important; animation:pulseBdr 1.4s ease-in-out infinite; }
    .pcard-skel-status {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:9px 18px; border-top:1px solid var(--bdr);
      background:var(--blue-xlt); font-size:.73rem; color:var(--blue-mid); font-weight:500;
    }

    /* ─── Toolbar ─── */
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:13px; }
    .filtros-extra-row {
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
      padding:14px 16px; margin:-4px 0 13px;
      background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r-lg);
      box-shadow:var(--sh-xs); animation:fadeUp .2s var(--ease-out);
    }
    .fx-field { display:flex; align-items:center; gap:8px; }
    .fx-lbl {
      font-size:.63rem; color:var(--text3); font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; white-space:nowrap;
    }
    .fx-in {
      font:inherit; font-size:.8rem; color:var(--text); background:var(--white);
      border:1px solid var(--bdr); border-radius:var(--r); transition:border-color var(--dur),box-shadow var(--dur),background var(--dur);
      -webkit-appearance:none; appearance:none;
    }
    .fx-in:hover { border-color:var(--bdr-mid); }
    .fx-in:focus { outline:none; border-color:var(--blue-mid); box-shadow:var(--sh-blue); background:var(--white); }
    /* ── Combobox propio (reemplaza el <select> nativo del filtro Despacho) ── */
    .fx-select-wrap { position:relative; }
    .fx-select-btn {
      display:flex; align-items:center; gap:10px; justify-content:space-between;
      font:inherit; font-size:.8rem; color:var(--text); background:var(--white);
      border:1px solid var(--bdr); border-radius:var(--r); padding:8px 11px;
      min-width:290px; max-width:340px; cursor:pointer;
      transition:border-color var(--dur),box-shadow var(--dur),background var(--dur);
    }
    .fx-select-btn span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fx-select-btn:hover { border-color:var(--bdr-mid); background:var(--blue-xlt); }
    .fx-select-wrap.is-open .fx-select-btn { border-color:var(--blue-mid); box-shadow:var(--sh-blue); background:var(--white); }
    .fx-chevron { flex-shrink:0; color:var(--text3); transition:transform var(--dur); }
    .fx-select-wrap.is-open .fx-chevron { transform:rotate(180deg); color:var(--blue-mid); }
    .fx-select-panel {
      position:absolute; top:calc(100% + 6px); left:0; min-width:100%; width:max-content; max-width:420px;
      background:var(--white); border:1px solid var(--bdr); border-radius:var(--r-md);
      box-shadow:0 12px 28px rgba(15,25,35,.14),0 2px 6px rgba(15,25,35,.06);
      max-height:260px; overflow-y:auto; z-index:120; padding:6px;
      animation:fadeUp .15s var(--ease-out);
    }
    .fx-select-opt {
      padding:8px 10px; border-radius:var(--r-sm); font-size:.79rem; color:var(--text2);
      cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      transition:background var(--dur),color var(--dur);
    }
    .fx-select-opt:hover { background:var(--blue-lt); color:var(--blue); }
    .fx-select-opt.is-selected { background:var(--blue-mid); color:#fff; font-weight:600; }
    input[type="date"].fx-in {
      padding:7px 10px; font-variant-numeric:tabular-nums; color-scheme:light;
    }
    input[type="date"].fx-in::-webkit-calendar-picker-indicator {
      filter:invert(46%) sepia(15%) saturate(700%) hue-rotate(165deg) brightness(95%);
      cursor:pointer; opacity:.75; transition:opacity var(--dur);
    }
    input[type="date"].fx-in::-webkit-calendar-picker-indicator:hover { opacity:1; }
    .fx-divider { width:1px; align-self:stretch; background:var(--bdr); margin:0 2px; }
    #fx-limpiar.tb-btn { margin-left:auto; color:var(--text3); }
    #fx-limpiar.tb-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-lt); }
    .search-wrap { flex:1; position:relative; display:flex; align-items:center; }
    .search-ico  { position:absolute; left:11px; color:var(--text4); pointer-events:none; }
    .search-in   { width:100%; padding:9px 13px 9px 36px; border:1px solid var(--bdr); border-radius:var(--r); font-size:.85rem; color:var(--text); background:var(--bg-card); transition:border-color var(--dur),box-shadow var(--dur); }
    .search-in:focus { outline:none; border-color:var(--blue-mid); box-shadow:var(--sh-blue); }
    .tb-btn { display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border:1px solid var(--bdr); border-radius:var(--r); background:var(--bg-card); font-size:.78rem; font-weight:600; color:var(--text2); white-space:nowrap; transition:all var(--dur); }
    .tb-btn:hover { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-lt); }
    .tb-btn.updating { background:var(--blue); border-color:var(--blue); color:var(--white); }

    /* ─── Add Form & Steps Loading ─── */
    .add-form { background:var(--bg-card); border:1.5px solid var(--blue-mid); border-radius:var(--r-lg); padding:20px 22px; margin-bottom:13px; box-shadow:0 0 0 4px rgba(37,99,168,.07),var(--sh-sm); animation:fadeUp .2s var(--ease-out); }
    .add-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:16px; }
    /* ── Modal Agregar Proceso ── */
    @keyframes amSlideIn {
      from { opacity:0; transform:translateY(24px) scale(.97); }
      to   { opacity:1; transform:translateY(0)     scale(1);   }
    }
    @keyframes amOverlayIn { from{opacity:0} to{opacity:1} }
    .am-overlay {
      position:fixed; inset:0; z-index:5000;
      background:rgba(10,18,36,.65); backdrop-filter:blur(3px);
      display:flex; align-items:center; justify-content:center;
      animation:amOverlayIn .2s ease; padding:16px;
    }
    .am-box {
      background:var(--white); border-radius:16px;
      width:min(94vw,560px); max-height:92vh; overflow-y:auto;
      box-shadow:0 12px 40px rgba(0,0,0,.12), 0 0 0 1px var(--bdr);
      animation:amSlideIn .26s cubic-bezier(.22,.61,.36,1);
    }
    .am-box::before {
      content:""; display:block; height:3px;
      background:linear-gradient(90deg,#2563a8 0%,#7c3aed 55%,#c9a84c 100%);
      border-radius:16px 16px 0 0;
    }
    .am-hdr {
      display:flex; align-items:center; gap:13px;
      padding:18px 22px 16px;
      border-bottom:1px solid var(--bdr);
    }
    .am-hdr-icon {
      width:38px; height:38px; border-radius:10px;
      background:var(--blue-xlt); border:1px solid rgba(37,99,168,.18);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; color:var(--blue-mid);
    }
    .am-title { font-size:.88rem; font-weight:800; color:var(--text); }
    .am-subtitle { font-size:.66rem; color:var(--text4); margin-top:2px; font-weight:400; }
    .am-close {
      width:30px; height:30px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      background:var(--bg); border:1px solid var(--bdr); color:var(--text3);
      cursor:pointer; font-size:.78rem; transition:all .15s; flex-shrink:0;
    }
    .am-close:hover { background:#fef2f2; border-color:#fca5a5; color:#dc2626; }
    .am-body { padding:20px 22px 22px; }
    /* Search row */
    .am-search-row { display:flex; gap:9px; margin-bottom:12px; }
    .am-search-wrap { position:relative; flex:1; }
    .am-search-in {
      width:100%; padding:14px 14px 14px 18px; font-size:.87rem;
      border:1.5px solid var(--bdr); border-radius:var(--r-md);
      outline:none; transition:border-color .2s, box-shadow .2s;
      box-sizing:border-box; background:var(--bg);
      font-family:var(--font); color:var(--text);
    }
    .am-search-in:focus {
      border-color:var(--blue-mid);
      box-shadow:0 0 0 3px rgba(37,99,168,.12);
      background:var(--white);
    }
    .am-search-in::placeholder { color:var(--text4); }
    .am-search-btn {
      padding:0 18px; height:48px;
      background:var(--blue);
      color:#fff; border:none; border-radius:var(--r-md);
      font-size:.82rem; font-weight:700; cursor:pointer;
      transition:background .15s; flex-shrink:0;
      letter-spacing:.01em; font-family:var(--font);
    }
    .am-search-btn:hover:not(:disabled) { background:var(--blue-mid); }
    .am-search-btn:disabled { opacity:.45; cursor:not-allowed; }
    .am-cartera-link {
      font-size:.71rem; color:var(--blue-mid); text-decoration:none;
      display:block; margin-bottom:14px; text-align:center;
      opacity:.65; transition:opacity .15s;
    }
    .am-cartera-link:hover { opacity:1; }
    /* Loading instances */
    .am-instances {
      display:flex; align-items:center; gap:10px; padding:11px 15px;
      background:var(--blue-xlt); border:1px solid var(--blue-lt);
      border-radius:var(--r-md); margin-bottom:14px;
      font-size:.77rem; color:var(--blue-mid);
      animation:fadeUp .2s var(--ease-out);
    }
    /* Preview */
    .am-preview {
      border:1px solid var(--bdr); border-radius:var(--r-md);
      overflow:hidden; animation:fadeUp .22s var(--ease-out);
      margin-bottom:16px;
    }
    .am-preview-top {
      padding:13px 18px;
      background:var(--bg);
      border-bottom:1px solid var(--bdr);
    }
    .am-preview-rad { font-size:.85rem; font-weight:800; color:var(--text); font-family:monospace; letter-spacing:.03em; margin-bottom:5px; display:flex; align-items:center; gap:8px; }
    .am-preview-src { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.62rem; font-weight:800; letter-spacing:.07em; background:rgba(37,99,168,.1); color:var(--blue-mid); }
    .am-preview-body { padding:14px 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px 18px; }
    .am-field-lbl { font-size:.61rem; font-weight:800; color:var(--text4); text-transform:uppercase; letter-spacing:.07em; margin-bottom:2px; }
    .am-field-val { font-size:.78rem; color:var(--text); line-height:1.45; }
    /* Alias label */
    .am-alias-lbl { font-size:.67rem; font-weight:700; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
    .am-alias-in {
      width:100%; padding:11px 14px; border:1.5px solid var(--bdr);
      border-radius:var(--r-md); font-size:.83rem; outline:none;
      transition:border-color .2s, box-shadow .2s; box-sizing:border-box;
      margin-bottom:16px; font-family:var(--font); color:var(--text);
      background:var(--bg);
    }
    .am-alias-in:focus { border-color:var(--blue-mid); box-shadow:0 0 0 3px rgba(37,99,168,.1); background:var(--white); }
    /* CTA */
    .am-cta {
      padding:10px 28px;
      background:var(--blue-mid);
      color:#fff; border:none; border-radius:99px;
      font-size:.82rem; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      transition:background .15s, box-shadow .15s, transform .1s; font-family:var(--font);
      box-shadow:0 2px 8px rgba(37,99,168,.25);
      align-self:center; margin:0 auto;
    }
    .am-cta:hover:not(:disabled) { background:#1d4ed8; box-shadow:0 4px 12px rgba(37,99,168,.35); transform:translateY(-1px); }
    .am-cta:active:not(:disabled) { transform:translateY(0); box-shadow:0 1px 4px rgba(37,99,168,.2); }
    .am-cta:disabled { opacity:.55; cursor:not-allowed; box-shadow:none; }
    .am-cta-wrap { display:flex; justify-content:center; padding-top:4px; }
    /* Steps in modal */
    .am-steps {
      margin-top:16px; padding:0;
      display:flex; flex-direction:column; gap:0;
      animation:fadeUp .22s var(--ease-out);
      border:1px solid var(--bdr); border-radius:var(--r-md); overflow:hidden;
    }
    .am-step {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; font-size:.76rem; color:var(--text3);
      background:var(--bg); border-bottom:1px solid var(--bdr);
      transition:background .18s, color .18s;
    }
    .am-step:last-child { border-bottom:none; }
    .am-step-num {
      width:22px; height:22px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.6rem; font-weight:800; background:var(--bdr);
      color:var(--text4); transition:all .2s;
    }
    .am-step.active { color:var(--blue-mid); background:var(--blue-xlt); }
    .am-step.active .am-step-num { background:var(--blue-mid); color:#fff; }
    .am-step.done { color:var(--green-dk); background:#f0fdf4; }
    .am-step.done .am-step-num { background:#16a34a; color:#fff; }
    .am-step.err { color:var(--red); background:var(--red-lt); }
    .am-step.err .am-step-num { background:var(--red); color:#fff; }
    /* ── Confirm Dialog ── */
    .cfdg-overlay {
      position:fixed; inset:0; z-index:9900;
      background:rgba(10,18,36,.6); backdrop-filter:blur(2px);
      display:flex; align-items:center; justify-content:center;
      animation:amOverlayIn .18s ease; padding:16px;
    }
    .cfdg-box {
      background:var(--white); border-radius:16px; width:min(90vw,380px);
      box-shadow:0 24px 60px rgba(0,0,0,.32);
      animation:amSlideIn .22s cubic-bezier(.22,.61,.36,1);
      overflow:hidden;
    }
    .cfdg-icon {
      display:flex; align-items:center; justify-content:center;
      padding:24px 24px 0;
    }
    .cfdg-icon-inner {
      width:52px; height:52px; border-radius:50%;
      background:#fef2f2; border:1px solid #fecaca;
      display:flex; align-items:center; justify-content:center;
      color:#dc2626;
    }
    .cfdg-body { padding:18px 24px 22px; text-align:center; }
    .cfdg-title { font-size:.95rem; font-weight:800; color:var(--text); margin-bottom:6px; }
    .cfdg-msg { font-size:.8rem; color:var(--text2); line-height:1.65; }
    .cfdg-actions { display:flex; gap:10px; padding:0 24px 22px; }
    .cfdg-cancel {
      flex:1; padding:11px; border:1.5px solid var(--bdr); border-radius:var(--r-md);
      font-size:.83rem; font-weight:600; color:var(--text2); background:var(--bg);
      cursor:pointer; transition:all .15s; font-family:var(--font);
    }
    .cfdg-cancel:hover { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-lt); }
    .cfdg-confirm {
      flex:1; padding:11px; border:none; border-radius:var(--r-md);
      font-size:.83rem; font-weight:700; color:#fff;
      background:linear-gradient(135deg,#dc2626,#991b1b);
      cursor:pointer; transition:opacity .15s, transform .13s; font-family:var(--font);
      box-shadow:0 3px 12px rgba(220,38,38,.3);
    }
    .cfdg-confirm:hover { opacity:.87; transform:translateY(-1px); }
    .cfdg-confirm:active { transform:translateY(0); }
    .f-field { display:flex; flex-direction:column; gap:5px; }
    .f-label { font-size:.66rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); }
    .f-req   { color:var(--gold-dk); }
    .f-opt   { font-weight:400; text-transform:none; letter-spacing:0; color:var(--text4); font-size:.65rem; }
    .f-in    { padding:9px 12px; border:1px solid var(--bdr); border-radius:var(--r); font-size:.88rem; color:var(--text); background:var(--bg); transition:border-color var(--dur),box-shadow var(--dur); }
    .f-in:focus { outline:none; border-color:var(--blue-mid); background:var(--white); box-shadow:var(--sh-blue); }
    .f-actions { display:flex; gap:9px; align-items:center; }

    /* Steps loading while consulting RJ */
    .step-box { margin-top:16px; padding:16px 18px; background:var(--blue-xlt); border:1px solid var(--blue-lt); border-radius:var(--r-md); display:none; }
    .step-box.visible { display:block; }
    .step-title { font-size:.72rem; font-weight:700; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; }
    .step-item  { display:flex; align-items:center; gap:10px; padding:6px 0; animation:stepIn .2s var(--ease-out) both; }
    .step-item + .step-item { border-top:1px solid var(--bdr); }
    .step-ico   { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:.7rem; }
    .step-ico.wait   { background:var(--bg); color:var(--text4); }
    .step-ico.active { background:var(--blue-lt); animation:scanPulse 1s infinite; }
    .step-ico.done   { background:var(--green-lt); color:var(--green); animation:checkIn .25s var(--ease-out); }
    .step-ico.error  { background:var(--red-lt); color:var(--red); }
    .step-text { font-size:.8rem; color:var(--text2); flex:1; }
    .step-text.active { color:var(--blue); font-weight:600; }
    .step-text.done   { color:var(--text3); }

    /* ─── Buttons ─── */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border-radius:var(--r); font-size:.78rem; font-weight:600; border:1px solid transparent; transition:all .2s var(--ease-out); }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:none; }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none !important; }
    .btn-blue  { background:var(--blue); color:var(--white); box-shadow:0 4px 12px rgba(26,58,92,.22); }
    .btn-blue:hover { background:var(--blue-dark); box-shadow:0 6px 18px rgba(26,58,92,.32); }
    .btn-ghost { background:transparent; color:var(--text2); border-color:var(--bdr); }
    .btn-ghost:hover { background:var(--bg); border-color:var(--bdr-mid); }

    /* ─── Process Cards ─── */
    .proc-list { display:flex; flex-direction:column; gap:10px; }

    .pcard {
      background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r-lg);
      box-shadow:var(--sh-xs); overflow:visible; position:relative;
      transition:box-shadow .22s var(--ease),border-color .22s,transform .22s var(--ease);
    }
    .pcard::before { /* accent left border */
      content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--bdr-mid); border-radius:var(--r-lg) 0 0 var(--r-lg);
      transition:background .22s,width .22s;
    }
    .pcard.novedad::before { background:var(--gold); }
    .pcard.activo::before  { background:var(--green); }
    .pcard.inactivo::before{ background:var(--text4); }
    .pcard:hover { box-shadow:var(--sh-md); border-color:var(--bdr-mid); transform:translateY(-2px); }
    .pcard:hover::before { width:4px; }

    /* Updating animation */
    .pcard-updating { animation:pulseBdr 1.4s ease-in-out infinite; }
    .pcard-updating::before { background:var(--blue-mid) !important; }

    /* Delete button - absolute top right */
    .pcard-del {
      position:absolute; top:12px; right:12px; z-index:10;
      width:30px; height:30px; border-radius:var(--r);
      background:var(--bg); border:1px solid var(--bdr);
      display:flex; align-items:center; justify-content:center;
      color:var(--text3); transition:all var(--dur);
    }
    .pcard-del:hover { background:var(--red-lt); border-color:var(--red); color:var(--red); }

    .pcard-body { display:flex; overflow:hidden; border-radius:var(--r-lg); }

    /* ── Left: info ── */
    .pi { flex:1; min-width:0; padding:15px 48px 15px 18px; border-right:1px solid var(--bdr); }
    .pi-top { display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:10px; }
    .pi-rad { font-size:.97rem; font-weight:700; color:var(--blue-mid); letter-spacing:.04em; word-break:break-all; transition:color var(--dur); }
    .pi-rad:hover { color:var(--blue); text-decoration:underline; }

    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:99px; font-size:.61rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .badge-novedad { background:rgba(201,168,76,.14); color:var(--gold-dk); border:1px solid rgba(201,168,76,.3); }
    .badge-activo  { background:var(--green-lt); color:var(--green-dk); }
    .badge-inactivo{ background:var(--bg); color:var(--text3); border:1px solid var(--bdr); }
    .badge-new-act { background:var(--gold); color:var(--blue-dark); }
    .badge-pp      { background:var(--amber-lt); color:#92400e; border:1px solid #fde68a; }

    .pi-grid { display:flex; flex-direction:column; gap:3px; margin-bottom:12px; }
    .pi-row  { display:flex; gap:7px; font-size:.79rem; line-height:1.45; align-items:flex-start; }
    .pi-lbl  { font-weight:700; color:var(--text3); flex-shrink:0; min-width:88px; font-size:.68rem; text-transform:uppercase; letter-spacing:.07em; }
    .pi-val  { color:var(--text2); }
    .pi-val strong { color:var(--text); font-weight:700; }

    .pi-actions { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .act-btn {
      display:inline-flex; align-items:center; gap:5px; padding:5px 11px;
      border:1px solid var(--bdr); border-radius:var(--r); font-size:.72rem; font-weight:600;
      color:var(--text2); background:var(--bg); transition:all var(--dur); white-space:nowrap;
    }
    .act-btn:hover { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-lt); }
    .act-btn.ai-btn { color:var(--purple); border-color:rgba(124,58,237,.25); background:rgba(124,58,237,.05); }
    .act-btn.ai-btn:hover { border-color:var(--purple); background:rgba(124,58,237,.1); color:var(--purple); }
    .act-btn.min-btn { color:#a8893a; border-color:rgba(201,168,76,.3); background:rgba(201,168,76,.07); }
    .act-btn.min-btn:hover { border-color:#c9a84c; background:rgba(201,168,76,.15); color:#7a6128; }
    .act-btn.open svg.chev { transform:rotate(180deg); }
    .act-btn svg.chev { transition:transform .2s; }

    /* ── Right: sources panel ── */
    .ps { width:280px; flex-shrink:0; padding:13px 14px; background:var(--blue-xlt); display:flex; flex-direction:column; gap:9px; }

    .ps-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; flex-wrap:wrap; }
    .ps-lbl    { font-size:.57rem; font-weight:800; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; line-height:1.3; }
    .ps-badges { display:flex; gap:5px; align-items:center; flex-shrink:0; }

    .src-b {
      width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:.55rem; font-weight:800; color:var(--white); cursor:default;
      transition:transform var(--dur),box-shadow var(--dur);
    }
    .src-b:hover { transform:scale(1.12); }
    .src-b.on-rj { background:var(--src-rj); box-shadow:0 2px 8px rgba(22,163,74,.35); }
    .src-b.on-pp { background:var(--src-pp); box-shadow:0 2px 8px rgba(217,119,6,.35); opacity:1 !important; }
    .src-b.off   { background:var(--src-off); opacity:.38; }

    .ps-subtitle { font-size:.66rem; color:var(--text3); font-weight:500; }

    /* 2-col grid, each col equal */
    .src-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .src-card { background:var(--white); border:1px solid var(--bdr); border-radius:var(--r); padding:9px 10px; min-width:0; overflow:hidden; }
    .src-card:hover { box-shadow:var(--sh-xs); }
    .src-card.inactive { opacity:.5; }
    .src-card-head { display:flex; align-items:center; gap:5px; margin-bottom:4px; min-width:0; }
    .src-dot  { width:16px; height:16px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.46rem; font-weight:800; color:var(--white); }
    .src-name { font-size:.58rem; font-weight:700; color:var(--text3); letter-spacing:.05em; text-transform:uppercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .src-act  { font-size:.7rem; font-weight:700; color:var(--text); line-height:1.25; margin-bottom:2px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .src-date { font-size:.62rem; color:var(--text3); margin-bottom:6px; }
    .src-no   { font-size:.68rem; color:var(--text3); font-style:italic; }
    .src-ver  { display:inline-flex; align-items:center; gap:3px; padding:3px 7px; border:1px solid var(--bdr); border-radius:var(--r-xs); font-size:.62rem; font-weight:600; color:var(--text2); background:var(--bg); transition:all .13s; }
    .src-ver:hover { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-lt); }

    .ps-meta { font-size:.63rem; color:var(--text3); display:flex; flex-direction:column; gap:1px; }
    .ps-meta strong { color:var(--text2); font-weight:600; }

    /* ── Card Footer (PP only) ── */
    .pcard-foot {
      display:flex; align-items:center; justify-content:flex-end; gap:8px;
      padding:7px 16px; border-top:1px solid var(--bdr); background:#f7f9fc;
      border-radius:0 0 var(--r-lg) var(--r-lg);
    }
    .toggle-pubs { display:inline-flex; align-items:center; gap:5px; background:none; border:none; font-size:.72rem; font-weight:600; color:var(--amber); cursor:pointer; padding:2px 0; transition:color var(--dur); }
    .toggle-pubs:hover { color:#92400e; }
    .toggle-pubs svg.chev { transition:transform .2s; }
    .toggle-pubs.open svg.chev { transform:rotate(180deg); }

    /* ── Actuaciones Panel ── */
    .acts-panel { border-top:1px solid var(--bdr); background:var(--bg-card); animation:fadeUp .18s var(--ease-out); }
    .acts-hdr   { display:flex; align-items:center; gap:8px; padding:9px 18px 8px; font-size:.71rem; font-weight:700; color:var(--text3); border-bottom:1px solid var(--bdr); }
    .acts-list  { padding:13px 18px 17px; display:flex; flex-direction:column; }
    .acts-empty { padding:14px 18px; font-size:.8rem; color:var(--text3); }
    .act-row  { display:flex; }
    .act-tl   { display:flex; flex-direction:column; align-items:center; width:20px; flex-shrink:0; margin-top:3px; }
    .act-dot  { width:9px; height:9px; border-radius:50%; background:var(--bdr-mid); border:2px solid var(--white); box-shadow:0 0 0 1.5px var(--bdr-mid); flex-shrink:0; z-index:1; }
    .act-dot.new-dot { background:var(--gold); box-shadow:0 0 0 1.5px var(--gold-dk),0 0 8px rgba(201,168,76,.4); }
    .act-line { flex:1; width:1.5px; background:var(--bdr); min-height:10px; margin:2px 0; }
    .act-body { flex:1; padding-bottom:13px; padding-left:10px; }
    .act-fecha{ font-size:.62rem; color:var(--text3); font-weight:700; letter-spacing:.07em; text-transform:uppercase; margin-bottom:1px; }
    .act-nom  { font-size:.81rem; font-weight:600; color:var(--text); }
    .act-nom.new-act { color:var(--gold-dk); }
    .act-anot { font-size:.73rem; color:var(--text2); margin-top:3px; line-height:1.5; }

    /* ── PP Panel ── */
    .pubs-panel { border-top:1px solid #fde68a; background:#fffbeb; border-radius:0 0 var(--r-lg) var(--r-lg); animation:fadeUp .18s var(--ease-out); }
    .pubs-hdr   { display:flex; align-items:center; gap:8px; padding:9px 16px 8px; font-size:.72rem; font-weight:700; color:#78350f; border-bottom:1px solid #fde68a; }
    .pub-list   { padding:10px 13px 13px; display:flex; flex-direction:column; gap:7px; }
    .pub-item   { background:var(--white); border:1px solid #fde68a; border-radius:var(--r); padding:10px 13px; transition:box-shadow var(--dur); }
    .pub-item:hover { box-shadow:0 2px 8px rgba(201,168,76,.14); }
    .pub-item.match { border-color:#86efac; background:#f0fdf4; }
    .pub-top  { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
    .pub-found{ display:inline-flex; align-items:center; gap:3px; background:#dcfce7; color:#15803d; border:1px solid #86efac; font-size:.62rem; font-weight:600; padding:2px 7px; border-radius:99px; }
    .pub-court{ display:inline-flex; align-items:center; gap:3px; background:#fef9ee; color:#a16207; border:1px solid #fde68a; font-size:.62rem; font-weight:500; padding:2px 7px; border-radius:99px; }
    .pub-date { font-size:.64rem; color:var(--text3); }
    .pub-title{ font-size:.77rem; font-weight:600; color:var(--text); margin-bottom:1px; line-height:1.35; }
    .pub-desp { font-size:.66rem; color:var(--text3); margin-bottom:6px; }

    /* item pager */
    .ipager     { display:flex; align-items:center; justify-content:center; gap:10px; padding:7px 14px; border-top:1px solid var(--bdr); }
    .ipager-btn { background:none; border:1px solid var(--bdr); border-radius:var(--r); padding:3px 11px; font-size:.69rem; font-weight:600; color:var(--text2); transition:all var(--dur); }
    .ipager-btn:hover:not(:disabled) { border-color:var(--blue-mid); color:var(--blue); }
    .ipager-btn:disabled { opacity:.3; cursor:default; }
    .ipager-info{ font-size:.67rem; color:var(--text3); }

    /* ─── Copilot IA Panel ─── */
    .ai-panel { border-top:1px solid rgba(124,58,237,.2); background:linear-gradient(135deg,rgba(124,58,237,.03),rgba(37,99,168,.03)); border-radius:0 0 var(--r-lg) var(--r-lg); animation:fadeUp .18s var(--ease-out); }
    .ai-panel-hdr  { display:flex; align-items:center; gap:8px; padding:10px 18px 9px; font-size:.72rem; font-weight:700; color:var(--purple); border-bottom:1px solid rgba(124,58,237,.15); }
    .ai-panel-body { padding:14px 18px; }
    .ai-textarea   { width:100%; min-height:80px; padding:10px 12px; border:1px solid rgba(124,58,237,.25); border-radius:var(--r); font-size:.82rem; font-family:var(--font); color:var(--text); background:var(--white); resize:vertical; transition:border-color var(--dur),box-shadow var(--dur); }
    .ai-textarea:focus { outline:none; border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.1); }
    .ai-textarea::placeholder { color:var(--text4); }
    .ai-actions { display:flex; gap:9px; margin-top:10px; flex-wrap:wrap; align-items:center; }
    .ai-btn-action { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border:1px solid rgba(124,58,237,.3); border-radius:var(--r); font-size:.73rem; font-weight:600; color:var(--purple); background:rgba(124,58,237,.07); transition:all var(--dur); }
    .ai-btn-action:hover { background:rgba(124,58,237,.14); border-color:var(--purple); }
    .ai-btn-action:disabled { opacity:.5; cursor:not-allowed; }
    .ai-hint { font-size:.67rem; color:var(--text3); margin-left:auto; }
    .ai-response { margin-top:12px; padding:0; background:transparent; border:none; font-size:.8rem; line-height:1.6; color:var(--text2); display:none; }
    .ai-response.visible { display:block; animation:fadeUp .2s var(--ease-out); }
    /* AI result card */
    .ai-result-card { background:var(--white); border:1px solid rgba(124,58,237,.18); border-radius:var(--r-md); overflow:hidden; }
    .ai-result-meta { display:flex; flex-wrap:wrap; gap:6px; padding:10px 14px 8px; border-bottom:1px solid rgba(124,58,237,.1); background:rgba(124,58,237,.03); }
    .ai-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:99px; font-size:.61rem; font-weight:700; letter-spacing:.04em; border:1px solid; }
    .ai-badge-juzgado { background:rgba(37,99,168,.08); color:var(--blue-mid); border-color:rgba(37,99,168,.2); }
    .ai-badge-etapa   { background:rgba(124,58,237,.08); color:var(--purple); border-color:rgba(124,58,237,.2); }
    .ai-result-body { padding:13px 14px; display:flex; flex-direction:column; gap:11px; }
    .ai-paso-lbl { font-size:.6rem; font-weight:800; color:var(--text3); letter-spacing:.09em; text-transform:uppercase; margin-bottom:4px; }
    .ai-paso-box { display:flex; gap:10px; align-items:flex-start; padding:11px 13px; background:var(--blue-xlt); border:1px solid var(--blue-lt); border-radius:var(--r); }
    .ai-paso-txt { font-size:.82rem; line-height:1.65; color:var(--text); font-weight:500; }
    .ai-termino-box { display:flex; gap:9px; align-items:flex-start; padding:9px 12px; background:#faf5ff; border:1px solid rgba(124,58,237,.18); border-radius:var(--r); }
    .ai-termino-lbl { font-size:.6rem; font-weight:700; color:var(--purple); letter-spacing:.06em; text-transform:uppercase; margin-bottom:2px; }
    .ai-termino-txt { font-size:.79rem; color:var(--text2); line-height:1.5; }
    .ai-fuentes { padding:9px 12px; background:var(--bg); border:1px solid var(--bdr); border-radius:var(--r); }
    .ai-fuentes-lbl { font-size:.6rem; font-weight:700; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
    .ai-fuentes ul { margin:0; padding-left:14px; display:flex; flex-direction:column; gap:3px; }
    .ai-fuentes li { font-size:.74rem; color:var(--text2); line-height:1.45; }
    .ai-verificar-box { display:flex; gap:9px; align-items:flex-start; padding:9px 12px; background:#f0fdf4; border:1px solid #86efac; border-radius:var(--r); }
    .ai-verificar-lbl { font-size:.6rem; font-weight:700; color:#15803d; letter-spacing:.06em; text-transform:uppercase; margin-bottom:2px; }
    .ai-verificar-txt { font-size:.76rem; color:#166534; line-height:1.5; }
    .ai-disclaimer { font-size:.67rem; color:var(--text4); font-style:italic; line-height:1.5; padding:0 2px; }
    .ai-alerta-alta { background:#fef2f2; border-color:#fca5a5; }
    .ai-alerta-media { background:#fffbeb; border-color:#fde68a; }

    /* ─── Minutas Panel ─── */
    .sb-item.min-item { color:#a8893a; }
    .sb-item.min-item:hover, .sb-item.min-item.active { background:rgba(201,168,76,.13); color:#7a6128; }
    .sb-item.min-item.active { border-right:none; }
    /* Minutas main view */
    .min-view-wrap { display:flex; flex-direction:column; gap:0; }
    .min-view-hdr { display:flex; align-items:center; gap:10px; padding:14px 18px 12px; border-bottom:1px solid rgba(201,168,76,.18); background:rgba(201,168,76,.05); }
    .min-view-title { font-size:.82rem; font-weight:700; color:#a8893a; flex:1; letter-spacing:.02em; }
    .min-section-hdr { font-size:.6rem; font-weight:800; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin:0 0 8px; }
    /* Minutas list */
    .min-list-wrap { display:flex; flex-direction:column; gap:6px; }
    .min-list-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--white); border:1px solid var(--bdr); border-radius:var(--r); cursor:pointer; transition:all var(--dur); }
    .min-list-item:hover { border-color:rgba(201,168,76,.4); background:rgba(201,168,76,.06); }
    .min-list-item.selected { border-color:#c9a84c; background:rgba(201,168,76,.1); }
    .min-list-name { font-size:.79rem; font-weight:600; color:var(--text2); flex:1; }
    .min-list-cat { font-size:.63rem; color:var(--text3); white-space:nowrap; }
    .min-tag { display:inline-flex; align-items:center; padding:2px 8px; border-radius:99px; font-size:.58rem; font-weight:700; letter-spacing:.05em; background:rgba(201,168,76,.12); color:#a8893a; border:1px solid rgba(201,168,76,.25); }
    /* Suggested banner */
    .min-suggest-banner { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; background:rgba(201,168,76,.09); border:1px solid rgba(201,168,76,.3); border-radius:var(--r); margin-bottom:4px; }
    .min-suggest-txt { font-size:.76rem; color:#7a6128; line-height:1.5; flex:1; }
    .min-suggest-lbl { font-size:.58rem; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:#a8893a; margin-bottom:2px; }
    /* Editor */
    .min-editor-wrap { display:flex; flex-direction:column; background:var(--white); border:1px solid rgba(201,168,76,.3); border-radius:var(--r-md); overflow:hidden; box-shadow:var(--sh-sm); }
    .min-toolbar { display:flex; align-items:center; gap:3px; padding:7px 10px; background:linear-gradient(to bottom,#faf7ee,#f5f0e0); border-bottom:1px solid rgba(201,168,76,.22); flex-wrap:wrap; }
    .min-sep { width:1px; height:18px; background:rgba(201,168,76,.25); margin:0 4px; flex-shrink:0; }
    .min-tool-btn { min-width:26px; height:26px; border:1px solid transparent; border-radius:var(--r-sm); font-size:.8rem; font-weight:700; color:var(--text2); background:transparent; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding:0 5px; transition:all var(--dur); }
    .min-tool-btn:hover { background:rgba(201,168,76,.18); border-color:rgba(201,168,76,.35); color:#7a6128; }
    .min-font-sel { height:26px; border:1px solid rgba(201,168,76,.3); border-radius:var(--r-sm); background:var(--white); font-size:.72rem; color:var(--text2); padding:0 4px; cursor:pointer; outline:none; }
    .min-editor { min-height:360px; max-height:520px; overflow-y:auto; padding:32px 40px; font-family:"Georgia",serif; font-size:.94rem; line-height:1.8; color:var(--text); outline:none; }
    .min-editor:focus { box-shadow:inset 0 0 0 2px rgba(201,168,76,.2); }
    /* Export row */
    .min-export-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .min-export-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--r); font-size:.73rem; font-weight:600; cursor:pointer; border:1px solid; transition:all var(--dur); }
    .min-export-docx { background:rgba(37,99,168,.07); color:var(--blue-mid); border-color:rgba(37,99,168,.25); }
    .min-export-docx:hover { background:rgba(37,99,168,.15); }
    .min-export-pdf { background:rgba(185,28,28,.07); color:#b91c1c; border-color:rgba(185,28,28,.2); }
    .min-export-pdf:hover { background:rgba(185,28,28,.14); }
    .min-disclaimer { font-size:.67rem; color:var(--text4); font-style:italic; line-height:1.5; padding:2px 0; }
    /* Related minutas */
    .min-related-list { display:flex; flex-direction:column; gap:5px; }
    .min-rel-item { display:flex; align-items:center; gap:10px; padding:8px 13px; background:var(--bg); border:1px solid var(--bdr); border-radius:var(--r); cursor:pointer; transition:all var(--dur); }
    .min-rel-item:hover { background:rgba(201,168,76,.08); border-color:rgba(201,168,76,.3); }
    .min-rel-name { font-size:.77rem; font-weight:600; color:var(--text2); flex:1; }
    .min-rel-cat { font-size:.63rem; color:var(--text3); }
    .min-loading { padding:24px; color:var(--text3); font-size:.82rem; display:flex; align-items:center; gap:8px; }

    /* ─── Minutas: copiloto en modo conversación ─── */
    .min-chat-wrap { display:flex; flex-direction:column; gap:14px; max-width:760px; margin:0 auto; }
    .min-chat-msg { display:flex; gap:10px; align-items:flex-start; opacity:0; transform:translateY(6px); animation:minChatIn .4s var(--ease-out) forwards; }
    .min-chat-msg:nth-child(2) { animation-delay:.45s; }
    @keyframes minChatIn { to { opacity:1; transform:none; } }
    .min-chat-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#c9a84c,#a8893a); display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; box-shadow:0 2px 8px rgba(168,137,58,.35); }
    .min-chat-bubble { background:var(--white); border:1px solid rgba(201,168,76,.25); border-radius:14px 14px 14px 4px; padding:13px 16px; font-size:.83rem; line-height:1.65; color:var(--text2); box-shadow:var(--sh-sm); flex:1; }
    .min-chat-bubble strong { color:#7a6128; }
    .min-chat-typing { display:inline-flex; align-items:center; gap:4px; padding:4px 0 0; }
    .min-chat-typing span { width:6px; height:6px; border-radius:50%; background:#c9a84c; opacity:.4; animation:minDot 1.1s infinite ease-in-out; }
    .min-chat-typing span:nth-child(2) { animation-delay:.15s; }
    .min-chat-typing span:nth-child(3) { animation-delay:.3s; }
    @keyframes minDot { 0%,80%,100% { opacity:.25; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
    .min-chat-cards { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .min-chat-card { display:flex; align-items:center; gap:11px; padding:12px 14px; background:var(--bg); border:1px solid var(--bdr); border-radius:var(--r-md); cursor:pointer; transition:all var(--dur); text-align:left; width:100%; font-family:inherit; }
    .min-chat-card:hover { border-color:#c9a84c; background:rgba(201,168,76,.08); transform:translateX(2px); }
    .min-chat-card-icon { width:34px; height:34px; border-radius:9px; background:rgba(201,168,76,.14); display:flex; align-items:center; justify-content:center; color:#a8893a; flex-shrink:0; }
    .min-chat-card-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }
    .min-chat-card-name { font-size:.8rem; font-weight:700; color:var(--text2); }
    .min-chat-card-cat { font-size:.66rem; color:var(--text3); }
    .min-chat-card-best { border-color:#c9a84c; background:rgba(201,168,76,.1); }
    .min-chat-card-badge { font-size:.58rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#a8893a; background:rgba(201,168,76,.18); padding:2px 7px; border-radius:99px; flex-shrink:0; }
    .min-chat-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .min-chat-link-btn { font-size:.75rem; font-weight:600; color:#a8893a; background:none; border:1px dashed rgba(201,168,76,.4); border-radius:var(--r); padding:8px 14px; cursor:pointer; transition:all var(--dur); font-family:inherit; }
    .min-chat-link-btn:hover { background:rgba(201,168,76,.08); border-style:solid; }

    /* ── Selector "¿En qué proceso necesitas ayuda?" ── */
    .min-proc-list { display:flex; flex-direction:column; gap:8px; }
    .min-proc-card { display:flex; align-items:center; gap:12px; padding:13px 15px; background:var(--white); border:1px solid var(--bdr); border-radius:var(--r-md); cursor:pointer; transition:all var(--dur); text-align:left; width:100%; font-family:inherit; box-shadow:var(--sh-xs); }
    .min-proc-card:hover { border-color:#c9a84c; background:rgba(201,168,76,.06); transform:translateX(2px); box-shadow:var(--sh-sm); }
    .min-proc-card-icon { width:34px; height:34px; border-radius:9px; background:rgba(201,168,76,.14); display:flex; align-items:center; justify-content:center; color:#a8893a; flex-shrink:0; }
    .min-proc-card-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    .min-proc-card-title { font-size:.82rem; font-weight:700; color:var(--text2); }
    .min-proc-card-rad { font-size:.68rem; color:var(--text3); font-family:monospace; }
    .min-proc-card-desp { font-size:.68rem; color:var(--text3); display:flex; align-items:center; gap:4px; }
    .min-proc-card-arrow { color:var(--text4); flex-shrink:0; display:flex; }
    .min-phase { animation:minPhaseIn .32s var(--ease-out); }
    @keyframes minPhaseIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .min-back-btn { display:inline-flex; align-items:center; gap:6px; font-size:.73rem; font-weight:600; color:var(--text3); background:none; border:none; cursor:pointer; padding:4px 0; margin-bottom:10px; transition:color var(--dur); font-family:inherit; }
    .min-back-btn:hover { color:#a8893a; }
    .min-color-input { width:26px; height:26px; border:1px solid rgba(201,168,76,.3); border-radius:var(--r-sm); padding:0; cursor:pointer; background:none; }

    /* ─── Acts Modal ─── */
    .acts-modal { position:fixed; inset:0; z-index:2000; background:rgba(15,23,42,.55); display:flex; align-items:center; justify-content:center; animation:fadeIn .18s; padding:16px; }
    .acts-modal-box { background:var(--bg-card); border-radius:var(--r-lg); box-shadow:0 24px 64px rgba(0,0,0,.28); width:min(92vw,680px); max-height:82vh; display:flex; flex-direction:column; overflow:hidden; animation:fadeUp .2s var(--ease-out); }
    .acts-modal-hdr { display:flex; align-items:center; gap:9px; padding:13px 18px; border-bottom:1px solid var(--bdr); flex-shrink:0; }
    .acts-modal-title { font-size:.78rem; font-weight:700; color:var(--text2); flex:1; }
    .acts-modal-close { width:28px; height:28px; border-radius:var(--r); display:flex; align-items:center; justify-content:center; background:none; border:1px solid var(--bdr); color:var(--text3); font-size:.9rem; cursor:pointer; transition:all var(--dur); flex-shrink:0; }
    .acts-modal-close:hover { background:var(--red-lt); border-color:var(--red); color:var(--red); }
    .acts-modal-body { overflow-y:auto; padding:16px 18px 20px; flex:1; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* ─── Pagination ─── */
    .pagrow { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 0 4px; }
    .pag-info { font-size:.73rem; color:var(--text3); }
    .pag-ctrl { display:flex; align-items:center; gap:4px; }
    .pag-btn  { min-width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r); font-size:.77rem; color:var(--text2); transition:all var(--dur); }
    .pag-btn:hover:not(:disabled) { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-lt); }
    .pag-btn.act { background:var(--blue); border-color:var(--blue); color:var(--white); font-weight:700; }
    .pag-btn:disabled { opacity:.3; cursor:not-allowed; }
    .pag-ell  { padding:0 4px; color:var(--text3); font-size:.77rem; }

    /* ─── Empty ─── */
    .empty { display:flex; flex-direction:column; align-items:center; gap:12px; padding:56px 24px; background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r-lg); text-align:center; color:var(--text3); }
    .empty svg { opacity:.22; color:var(--blue); }
    .empty h3  { font-family:var(--font-d); font-size:1.32rem; font-weight:700; color:var(--blue); margin-top:2px; }
    .empty p   { max-width:360px; font-size:.83rem; line-height:1.65; }

    /* ─── Logs ─── */
    .logs-wrap { background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r-lg); overflow:hidden; }
    .logs-hdr  { display:flex; align-items:center; gap:10px; padding:13px 17px 11px; font-size:.79rem; font-weight:600; color:var(--text2); border-bottom:1px solid var(--bdr); }
    .logs-clr  { margin-left:auto; background:none; border:1px solid var(--bdr); border-radius:var(--r); padding:3px 9px; font-size:.67rem; font-weight:600; color:var(--text3); transition:all var(--dur); font-family:var(--font); }
    .logs-clr:hover { background:var(--red-lt); border-color:var(--red); color:var(--red); }
    .log-row  { display:flex; align-items:flex-start; gap:11px; padding:11px 17px; border-bottom:1px solid var(--bdr); transition:background .1s; }
    .log-row:last-child { border-bottom:none; }
    .log-row:hover { background:var(--bg); }
    .log-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .log-dot-ok { background:#22c55e; }
    .log-dot-err{ background:#ef4444; }
    .log-body { flex:1; min-width:0; }
    .log-fecha { font-size:.67rem; color:var(--text3); margin-bottom:1px; }
    .log-tit   { font-size:.79rem; font-weight:500; color:var(--text); line-height:1.4; }
    .log-det   { font-size:.69rem; color:#b91c1c; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .log-badge { flex-shrink:0; font-size:.62rem; font-weight:700; padding:2px 8px; border-radius:99px; }
    .log-badge-ok { background:#dcfce7; color:#15803d; }
    .log-badge-err{ background:var(--red-lt); color:var(--red); }

    /* ─── Toast ─── */
    .toast { position:fixed; bottom:20px; right:20px; background:var(--blue); color:var(--white); padding:11px 18px; border-radius:var(--r-md); font-size:.82rem; font-weight:500; box-shadow:var(--sh-lg); transform:translateY(12px); opacity:0; transition:all .28s var(--ease-out); z-index:9999; max-width:360px; border-left:3px solid var(--gold); pointer-events:none; }
    .toast.show  { transform:none; opacity:1; }
    .toast.error { background:var(--red); border-left-color:#991b1b; }
    .toast.ok    { background:#166534; border-left-color:#14532d; }

    /* ─── Tooltip ─── */
    #tip {
      position:fixed; z-index:9999;
      background:linear-gradient(135deg,#0f172a,#1e3a5f);
      color:#f1f5f9; font-size:.7rem; line-height:1.55; font-weight:500;
      padding:7px 13px; border-radius:8px; max-width:240px;
      pointer-events:none; opacity:0;
      transition:opacity .17s ease;
      box-shadow:0 8px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(201,168,76,.15);
      border-left:2px solid rgba(201,168,76,.5);
      letter-spacing:.01em;
      white-space:normal; word-break:break-word;
    }

    /* ─── Access Denied ─── */
    .access-denied { max-width:450px; margin:70px auto; padding:0 24px; text-align:center; }
    .ad-icon { width:60px; height:60px; background:var(--blue-lt); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; color:var(--blue); }
    .access-denied h2 { font-family:var(--font-d); font-size:1.65rem; font-weight:700; color:var(--blue); margin-bottom:9px; }
    .access-denied p  { font-size:.85rem; color:var(--text2); line-height:1.65; margin-bottom:20px; }

    /* ─── Responsive ─── */
    @media(max-width:1080px){ .ps { width:250px; } .src-grid { grid-template-columns:1fr; } }
    @media(max-width:920px){
      :root { --sb-w:58px; }
      .sb-logo-text,.sb-sec,.sb-item-label,.sb-count,.sb-btn-add span,.sb-btn-logout span { display:none; }
      .sb-logo { justify-content:center; padding:13px 0; }
      .sb-logo-icon { margin:0 auto; }
      .sb-item { justify-content:center; padding:9px 0; }
      .sb-btn-add,.sb-btn-logout { justify-content:center; margin:3px; padding:9px; }
      .pcard-body { flex-direction:column; }
      .pi { border-right:none; padding-right:16px; }
      .ps { width:100%; border-top:1px solid var(--bdr); }
      .kpi-row { grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:600px){
      #page { padding:13px; }
      .add-form-grid { grid-template-columns:1fr; }
      .toolbar { flex-direction:column; }
      .tb-btn { width:100%; justify-content:center; }
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE MÓVIL COMPLETO  ≤ 640px
    ═══════════════════════════════════════════ */
    #mob-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:195; backdrop-filter:blur(2px);
    }
    #mob-overlay.open { display:block; }
    #mob-ham {
      display:none; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:var(--r); border:1px solid var(--bdr);
      background:var(--white); color:var(--text2); flex-shrink:0; cursor:pointer;
    }
    /* Barra de navegación inferior en móvil */
    #mob-nav {
      display:none; position:fixed; bottom:0; left:0; right:0;
      height:58px; background:var(--white); border-top:1px solid var(--bdr);
      z-index:190; box-shadow:0 -2px 12px rgba(15,25,35,.09);
      align-items:center; justify-content:space-around; padding:0 4px;
    }
    .mob-nav-btn {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:2px; padding:4px 10px; border:none; background:none;
      color:var(--text3); font-size:.52rem; font-weight:600;
      letter-spacing:.04em; text-transform:uppercase; flex:1;
      border-radius:var(--r); transition:color var(--dur),background var(--dur);
    }
    .mob-nav-btn svg { flex-shrink:0; }
    .mob-nav-btn.active { color:var(--blue); background:var(--blue-lt); }
    .mob-nav-btn.ai-active { color:var(--purple); background:rgba(124,58,237,.1); }
    .mob-nav-btn.min-active { color:#a8893a; background:rgba(201,168,76,.12); }
    .mob-nav-btn.add-active { background:var(--blue); color:#fff; border-radius:var(--r-md); }

    @media(max-width:640px){
      :root { --sb-w:0px; --hdr-h:50px; }

      /* Sidebar como drawer */
      #sidebar {
        transform:translateX(-100%); transition:transform .28s var(--ease-out);
        width:236px !important; z-index:200; box-shadow:var(--sh-lg);
      }
      #sidebar.mob-open { transform:translateX(0); }
      .sb-logo-text,.sb-sec,.sb-item-label,.sb-count,
      .sb-btn-add span,.sb-btn-logout span { display:block !important; }
      .sb-logo { justify-content:flex-start; padding:16px 18px 14px; }
      .sb-logo-icon { margin:0; }
      .sb-item { justify-content:flex-start; padding:7px 10px; }
      .sb-btn-add,.sb-btn-logout { justify-content:flex-start; margin:0; padding:10px 14px; }

      /* Main sin margen */
      #main { margin-left:0 !important; }

      /* Topbar ajustado */
      #topbar { padding:0 13px; gap:10px; }
      #mob-ham { display:flex; }
      .tb-back { font-size:.68rem; padding:4px 9px; }
      #header-plan-badge { display:none; }

      /* Página con padding inferior para la barra de nav */
      #page { padding:12px 12px 70px; }
      #refresh-bar { padding:8px 14px; }
      .rbar-inner { gap:8px; }

      /* KPIs: 2 columnas ajustadas */
      .kpi-row { grid-template-columns:1fr 1fr; gap:9px; }
      .kpi { padding:12px 13px; gap:10px; }
      .kpi-icon { width:34px; height:34px; }
      .kpi-val  { font-size:1.55rem; }
      .kpi-lbl  { font-size:.56rem; }

      /* Toolbar */
      .toolbar { flex-direction:column; gap:8px; }
      .tb-btn { width:100%; justify-content:center; font-size:.8rem; }
      .search-in { font-size:.82rem; }

      /* Cards — apilar verticalmente */
      .pcard { margin-bottom:10px; border-radius:var(--r-md); }
      .pcard-body { flex-direction:column !important; gap:0; }
      .pi {
        border-right:none !important; border-bottom:1px solid var(--bdr);
        padding:14px 14px 12px; width:100%;
      }
      .ps {
        width:100% !important; border-top:none !important;
        padding:12px 14px 14px;
      }
      .ps-header { flex-direction:column; align-items:flex-start; gap:5px; }
      .src-grid { grid-template-columns:1fr !important; gap:7px; }
      .pcard-hdr { padding:11px 14px; }
      .pcard-title { font-size:.87rem; }
      .pcard-desp  { font-size:.73rem; }
      .p-acts { padding:8px 14px 10px; flex-wrap:wrap; gap:6px; }
      .act-btn { font-size:.73rem; padding:6px 10px; }

      /* Modals a pantalla completa */
      .acts-modal {
        position:fixed; inset:0 !important; top:0 !important; left:0 !important;
        right:0 !important; bottom:0 !important;
        width:100% !important; max-width:100% !important;
        height:100dvh !important; max-height:100dvh !important;
        border-radius:0 !important; margin:0 !important;
        overflow:hidden;
      }
      .acts-modal-body { max-height:calc(100dvh - 110px) !important; }

      /* Vista Minutas: una columna */
      .min-view-wrap { grid-template-columns:1fr !important; }
      .min-editor { min-height:320px; font-size:.88rem; }
      .min-editor-wrap { border-radius:var(--r); }
      .min-toolbar { flex-wrap:wrap; gap:4px; padding:7px 8px; }
      .min-font-sel { max-width:90px; font-size:.72rem; }
      .min-export-row { flex-wrap:wrap; gap:5px; }
      .min-export-btn { font-size:.73rem; padding:6px 10px; }

      /* Add form */
      .add-form-grid { grid-template-columns:1fr !important; }

      /* Dashboard */
      .dash-grid, [style*="grid-template-columns:repeat(3"] { grid-template-columns:1fr !important; }

      /* Pubsmodal y actsmodal */
      .pub-item { padding:11px 13px; }
      .pub-top { flex-wrap:wrap; gap:4px; }
      .act-item { padding:10px 13px; }

      /* Breadcrumb compacto */
      .tb-bread { font-size:.65rem; }
      .tb-cur   { font-size:.82rem; }

      /* Barra de nav inferior visible */
      #mob-nav { display:flex; }

      /* ── Tarjetas de proceso en móvil ── */
      .pcard { margin-bottom:10px; }
      .pcard-body { flex-direction:column !important; }
      .pi {
        border-right:none !important; border-bottom:1px solid var(--bdr);
        padding:14px 14px 12px !important; width:100% !important;
      }
      .pi-actions { flex-wrap:wrap; gap:6px; }
      .act-btn { min-height:36px; font-size:.75rem; padding:6px 10px; flex-grow:1; justify-content:center; }
      .ps {
        width:100% !important; border-top:none !important;
        padding:12px 14px 14px !important;
      }
      .ps-header { flex-direction:row; align-items:center; }
      .src-grid { grid-template-columns:1fr !important; gap:7px; }

      /* ── KPIs ── */
      .kpi-row { grid-template-columns:1fr 1fr; gap:9px; }
      .kpi { padding:12px 13px; gap:10px; }
      .kpi-icon { width:34px; height:34px; }
      .kpi-val  { font-size:1.55rem; }
      .kpi-lbl  { font-size:.56rem; }

      /* ── Toolbar ── */
      .toolbar { flex-direction:column; gap:8px; }
      .toolbar .search-wrap { width:100%; }
      .search-in { font-size:.84rem; }
      .tb-btn { width:100%; justify-content:center; font-size:.8rem; min-height:40px; }

      /* ── Dashboard KPIs inline ── */
      [style*="grid-template-columns:repeat(4,1fr)"] { grid-template-columns:1fr 1fr !important; }
      [style*="grid-template-columns:2fr 1fr"]       { grid-template-columns:1fr !important; }
      [style*="grid-template-columns:repeat(3"]      { grid-template-columns:1fr !important; }

      /* ── Modal publicaciones — cabecera más compacta ── */
      .acts-modal-hdr { padding:10px 14px; }
      .acts-modal-title { font-size:.74rem; }
      .pubs-hdr { padding:8px 13px; }
      .pub-list  { padding:8px 10px 12px; gap:6px; }
      .pub-item  { padding:10px 12px; }
      .pub-title { font-size:.8rem; }
      .pub-desp  { font-size:.68rem; }
      .pub-found,.pub-court { font-size:.65rem; }
      .pub-date  { font-size:.65rem; }

      /* ── Actuaciones ── */
      .acts-list { padding:10px 13px 14px; }
      .act-nom   { font-size:.78rem; }
      .act-anot  { font-size:.7rem; }

      /* ── Footer de tarjeta ── */
      .pcard-foot { flex-wrap:wrap; gap:6px; padding:8px 12px; }
      .pcard-del  { min-height:36px; min-width:36px; }

      /* ── Botones en publicaciones del modal ── */
      [id="pubs-modal-body"] .act-btn { flex-grow:0; min-height:34px; }
    }

    /* ── Pantallas muy pequeñas (< 400px) ── */
    @media(max-width:400px){
      .kpi { flex-direction:column; align-items:flex-start; gap:6px; padding:10px 11px; }
      .kpi-icon { width:28px; height:28px; }
      .kpi-val  { font-size:1.3rem; }
      .kpi-lbl  { font-size:.52rem; }
      #page { padding:10px 10px 70px; }
      .act-btn { font-size:.7rem; padding:5px 8px; }
      .pi { padding:12px 11px 10px !important; }
      .ps { padding:10px 11px 12px !important; }
    }
  </style>
</head>
